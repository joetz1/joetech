da":["Ikungi","Iramba","Itigi","Manyoni","Mkalama","Singida Municipal","Singida Rural"],"Songwe":["Ileje","Mbozi","Momba","Songwe","Tunduma"],"Tabora":["Igunga","Kaliua","Nzega","Nzega Town","Sikonge","Tabora Municipal","Tabora Rural","Urambo","Uyui"],"Tanga":["Handeni","Handeni Town","Kilindi","Korogwe","Korogwe Town","Lushoto","Muheza","Mkinga","Pangani","Tanga City"],"Zanzibar North":["Kaskazini A","Kaskazini B"],"Zanzibar South":["Kati","Kusini"],"Zanzibar West":["Magharibi A","Magharibi B","Mjini"]};

    class AppState{
      constructor(){this.resetState()}
      resetState(){this.currentUser=null;this.currentRole=null;this.currentView='login';this.activeSection='dashboard';this.darkMode=localStorage.getItem('darkMode')==='true';this.notifications=[];this.logbookEntries=[];this.attendanceRecords=[];this.supervisors=[];this.allUsers=[];this.permissionRequests=[];this.selectedEntries=new Set();this.unreadNotifications=0;this.currentWeek=1;this.checkedInToday=false;this.isLateToday=false;this.showEntryForm=false;this.showProfile=false;this.showPermissionPage=false;this.selectedSupervisor=null;this.searchSupervisorQuery='';this.signatureEntryId=null;this.signatureCanvas=null;this.signatureCtx=null;this.isDrawing=false}

      async initialize(){if(this.darkMode)document.body.classList.add('dark');this.hideAll();this.renderSideMenu();await this.checkSession()}
      showNav(){document.getElementById('topNav').classList.add('visible');document.body.classList.add('logged-in')}
      hideAll(){document.getElementById('topNav').classList.remove('visible');document.body.classList.remove('logged-in');document.getElementById('sideMenu').classList.remove('open');document.getElementById('menuOverlay').classList.remove('active');document.getElementById('drawer').classList.remove('open');document.getElementById('overlay').classList.remove('active');['modalChecklist','modalSupervisor','modalExport','modalAttendance','modalSignature'].forEach(id=>{const el=document.getElementById(id);if(el){el.classList.add('hidden');el.innerHTML=''}})}
      delay(ms){return new Promise(resolve=>setTimeout(resolve,ms))}
      showLoading(msg){this.hideLoading();const o=document.createElement('div');o.id='loadingSpinner';o.className='spinner-overlay';o.innerHTML=`<div class="spinner"></div><p class="spinner-text">${msg}</p>`;document.body.appendChild(o)}
      hideLoading(){const el=document.getElementById('loadingSpinner');if(el)el.remove()}
      openModal(id,c){const m=document.getElementById(id);if(!m)return;m.innerHTML=c;m.classList.remove('hidden');m.onclick=function(e){if(e.target===m)app.closeModal(id)}}
      closeModal(id){const m=document.getElementById(id);if(!m)return;m.classList.add('hidden');m.innerHTML=''}

      renderSideMenu(){
        const mc=document.getElementById('menuContent');const rb=document.getElementById('roleBadge');if(!mc)return;
        if(rb)rb.textContent=this.currentRole==='student'?'🎓 Student':this.currentRole==='supervisor'?'👔 Supervisor':this.currentRole==='admin'?'🛡️ Admin':'Guest';
        let h='';
        if(this.currentUser){
          if(this.currentRole==='student'){h+=`<div class="menu-section">📋 Student Menu</div><div class="menu-item ${!this.showEntryForm&&!this.showProfile&&!this.showPermissionPage?'active':''}" onclick="app.goToDashboard();app.toggleSideMenu()"><i class="fas fa-th-large"></i> Dashboard</div><div class="menu-item ${this.showEntryForm?'active':''}" onclick="app.showNewEntryForm();app.toggleSideMenu()"><i class="fas fa-plus-circle"></i> New Entry</div><div class="menu-item ${this.showProfile?'active':''}" onclick="app.showProfilePage();app.toggleSideMenu()"><i class="fas fa-user"></i> Profile & Supervisor</div><div class="menu-item" onclick="app.showHistory();app.toggleSideMenu()"><i class="fas fa-history"></i> History</div><div class="menu-item" onclick="app.openExportModal();app.toggleSideMenu()"><i class="fas fa-download"></i> Export Entries</div><div class="menu-divider"></div><div class="menu-section">⏰ Attendance</div><div class="menu-item" onclick="app.checkIn();app.toggleSideMenu()"><i class="fas fa-clock"></i> Check In</div><div class="menu-item" onclick="app.checkOut();app.toggleSideMenu()"><i class="fas fa-sign-out-alt"></i> Check Out</div>`;if(this.isLateToday){h+=`<div class="menu-divider"></div><div class="menu-item warning-item" onclick="app.requestLatePermission();app.toggleSideMenu()"><i class="fas fa-paper-plane"></i> Request Permission</div>`}}
          else if(this.currentRole==='supervisor'){h+=`<div class="menu-section">📋 Supervisor Menu</div><div class="menu-item active" onclick="app.goToDashboard();app.toggleSideMenu()"><i class="fas fa-th-large"></i> Dashboard</div><div class="menu-item" onclick="app.showHistory();app.toggleSideMenu()"><i class="fas fa-history"></i> History</div><div class="menu-item" onclick="app.openExportModal();app.toggleSideMenu()"><i class="fas fa-download"></i> Export Entries</div><div class="menu-divider"></div><div class="menu-item" onclick="app.selectAllEntries();app.toggleSideMenu()"><i class="fas fa-check-square"></i> Select All (${this.selectedEntries.size})</div><div class="menu-item danger" onclick="app.bulkDeleteEntries();app.toggleSideMenu()"><i class="fas fa-trash-alt"></i> Delete Selected</div>`}
          else if(this.currentRole==='admin'){h+=`<div class="menu-section">📋 Admin Menu</div><div class="menu-item active" onclick="app.goToDashboard();app.toggleSideMenu()"><i class="fas fa-th-large"></i> Dashboard</div><div class="menu-item" onclick="app.showCreateSupervisorForm();app.toggleSideMenu()"><i class="fas fa-user-tie"></i> Create Supervisor</div><div class="menu-item" onclick="app.showRecoveryRequests();app.toggleSideMenu()"><i class="fas fa-key"></i> Recovery Requests</div><div class="menu-item" onclick="app.openExportModal();app.toggleSideMenu()"><i class="fas fa-download"></i> Export Data</div><div class="menu-divider"></div><div class="menu-item" onclick="app.selectAllSupervisors();app.toggleSideMenu()"><i class="fas fa-check-square"></i> Select Supervisors</div><div class="menu-item danger" onclick="app.bulkDeleteSupervisors();app.toggleSideMenu()"><i class="fas fa-trash-alt"></i> Delete Supervisors</div>`}
          h+=`<div class="menu-divider"></div><div class="menu-item" onclick="app.openNotificationDrawer();app.toggleSideMenu()"><i class="fas fa-bell"></i> Notifications ${this.unreadNotifications>0?`<span class="badge" style="background:var(--error);color:#fff;margin-left:auto;">${this.unreadNotifications}</span>`:''}</div>`}
        h+=`<div class="menu-divider"></div><div class="menu-item green" onclick="app.openChecklistModal()"><i class="fas fa-clipboard-list"></i> PT Field Checklist</div>`;
        if(this.currentUser){h+=`<div class="menu-divider"></div><div class="menu-section">⚙️ Settings</div><div class="menu-item" onclick="app.toggleDarkMode()"><i class="fas fa-moon"></i> Dark Mode: ${this.darkMode?'ON':'OFF'}</div><div class="menu-item danger" onclick="app.logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>`}
        mc.innerHTML=h;
      }

      updateTopBar(){const ud=document.getElementById('userNameDisplay');if(this.currentUser&&ud)ud.textContent=this.currentUser.fullName?.split(' ')[0]||'User';this.updateNotifBadge()}
      updateNotifBadge(){const b=document.getElementById('notifBadge');if(b){if(this.unreadNotifications>0){b.textContent=this.unreadNotifications>99?'99+':this.unreadNotifications;b.classList.remove('hidden')}else{b.textContent='0';b.classList.add('hidden')}}}
      async checkSession(){try{const u=await account.get();await this.fetchUserData(u)}catch(e){this.resetState();this.hideAll()}this.render()}
      async fetchUserData(user){try{const r=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.users,[Query.equal('email',user.email)]);if(r.documents.length>0){this.currentUser=r.documents[0];this.currentRole=this.currentUser.role;this.selectedSupervisor=this.currentUser.supervisorId;await this.loadInitialData()}}catch(e){this.resetState()}}
      async loadInitialData(){if(!this.currentUser)return;try{const[sups,allUsers]=await Promise.all([databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.users,[Query.equal('role','supervisor')]),databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.users,[Query.limit(200)])]);this.supervisors=sups.documents;this.allUsers=allUsers.documents;await this.loadNotifications();if(this.currentRole==='student'){await this.loadStudentData();await this.checkTodayAttendance()}else if(this.currentRole==='supervisor'){await this.loadSupervisorData();await this.loadPermissionRequests()}}catch(e){}}
      async checkTodayAttendance(){const today=new Date().toISOString().split('T')[0];try{const records=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,[Query.equal('studentId',this.currentUser.$id),Query.equal('checkInDate',today)]);if(records.documents.length>0){this.checkedInToday=true;this.isLateToday=records.documents[0].status==='late'&&!records.documents[0].permissionGranted}else{this.checkedInToday=false;this.isLateToday=false}}catch(e){this.checkedInToday=false}}
      async loadNotifications(){if(!this.currentUser)return;try{const r=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.notifications,[Query.equal('recipientId',this.currentUser.$id),Query.orderDesc('createdAt'),Query.limit(50)]);this.notifications=r.documents;this.unreadNotifications=this.notifications.filter(n=>!n.isRead).length;this.updateNotifBadge()}catch(e){}}
      async loadStudentData(){if(!this.currentUser)return;try{const[e,a]=await Promise.all([databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.logbookEntries,[Query.equal('studentId',this.currentUser.$id),Query.orderDesc('entryDate'),Query.limit(100)]),databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,[Query.equal('studentId',this.currentUser.$id),Query.orderDesc('checkInDate'),Query.limit(100)])]);this.logbookEntries=e.documents;this.attendanceRecords=a.documents;this.calculateCurrentWeek()}catch(e){}}
      async loadSupervisorData(){if(!this.currentUser)return;try{const entries=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.logbookEntries,[Query.equal('supervisorId',this.currentUser.$id),Query.orderDesc('entryDate'),Query.limit(200)]);this.logbookEntries=entries.documents}catch(e){}}
      async loadPermissionRequests(){if(!this.currentUser||this.currentRole!=='supervisor')return;try{const reqs=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.permissionRequests,[Query.equal('supervisorId',this.currentUser.$id),Query.equal('status','pending'),Query.orderDesc('createdAt')]);this.permissionRequests=reqs.documents}catch(e){this.permissionRequests=[]}}
      calculateCurrentWeek(){if(this.attendanceRecords.length===0){this.currentWeek=1;return}const f=new Date(this.attendanceRecords[this.attendanceRecords.length-1].checkInDate);const t=new Date();this.currentWeek=Math.ceil(Math.abs(t-f)/(1000*60*60*24*7))||1}

      render(){this.updateTopBar();this.renderSideMenu();const mc=document.getElementById('mainContent');if(!this.currentUser){this.hideAll();mc.innerHTML=this.renderAuth();setTimeout(()=>this.setupRegionDropdown(),100)}else{this.showNav();if(this.showProfile)mc.innerHTML=this.renderProfile();else if(this.showEntryForm)mc.innerHTML=this.renderEntryForm();else if(this.showPermissionPage)mc.innerHTML=this.renderPermissionPage();else{switch(this.currentRole){case'student':mc.innerHTML=this.renderStudentDashboard();break;case'supervisor':mc.innerHTML=this.renderSupervisorDashboard();break;case'admin':mc.innerHTML=this.renderAdminDashboard();break}}}}
      goToDashboard(){this.activeSection='dashboard';this.showEntryForm=false;this.showProfile=false;this.showPermissionPage=false;this.selectedEntries.clear();this.render()}
      showProfilePage(){this.showProfile=true;this.showEntryForm=false;this.showPermissionPage=false;this.render()}
      toggleSideMenu(){const m=document.getElementById('sideMenu');const o=document.getElementById('menuOverlay');if(m.classList.contains('open')){m.classList.remove('open');o.classList.remove('active')}else{this.renderSideMenu();m.classList.add('open');o.classList.add('active')}}

      async checkIn(){const today=new Date().toISOString().split('T')[0];const now=new Date();const dl=new Date(now);dl.setHours(9,30,0,0);const isLate=now>dl;try{const ex=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,[Query.equal('studentId',this.currentUser.$id),Query.equal('checkInDate',today)]);if(ex.documents.length){if(ex.documents[0].permissionGranted){this.checkedInToday=true;this.isLateToday=false;this.showToast('✅ Permission granted!','success');return}this.showToast('⚠️ Already checked in!','warning');return}await databases.createDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,ID.unique(),{studentId:this.currentUser.$id,checkInDate:today,checkInTime:now.toISOString(),weekNumber:this.currentWeek,status:isLate?'late':'present',permissionGranted:false});this.checkedInToday=true;this.isLateToday=isLate;await this.loadStudentData();this.render();isLate?this.showToast('⚠️ Late! Request permission from menu.','warning'):this.showToast('✅ Check-in!','success')}catch(er){this.showToast('❌ '+er.message,'error')}}
      async checkOut(){const today=new Date().toISOString().split('T')[0];try{const recs=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,[Query.equal('studentId',this.currentUser.$id),Query.equal('checkInDate',today)]);if(!recs.documents.length){this.showToast('⚠️ Check in first!','warning');return}await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,recs.documents[0].$id,{checkOutTime:new Date().toISOString()});await this.loadStudentData();this.render();this.showToast('✅ Check-out!','success')}catch(er){this.showToast('❌ '+er.message,'error')}}

      async requestLatePermission(){if(!this.currentUser.supervisorId||this.currentUser.supervisorId==='unassigned'){this.showToast('❌ No supervisor!','error');return}const today=new Date().toISOString().split('T')[0];try{const existing=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.permissionRequests,[Query.equal('studentId',this.currentUser.$id),Query.equal('requestDate',today)]);if(existing.documents.length>0){this.showToast('⚠️ Already sent today!','warning');return}this.showLoading('Sending request...');await this.delay(1500);await databases.createDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.permissionRequests,ID.unique(),{studentId:this.currentUser.$id,supervisorId:this.currentUser.supervisorId,requestDate:today,reason:'Late check-in',status:'pending',createdAt:new Date().toISOString()});await databases.createDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.notifications,ID.unique(),{recipientId:this.currentUser.supervisorId,title:'⏰ Permission Request',message:`${this.currentUser.fullName} requests permission.`,type:'permission_request',isRead:false,createdAt:new Date().toISOString()});this.hideLoading();this.showToast('✅ Request sent!','success');await this.loadInitialData();this.render()}catch(er){this.hideLoading();this.showToast('❌ '+er.message,'error')}}
      renderPermissionPage(){return`<div style="max-width:460px;margin:40px auto"><div class="glass-card"><div class="permission-alert"><i class="fas fa-clock" style="font-size:2rem;color:var(--warning)"></i><h2>Late Check-in</h2><p>Request supervisor permission to create entries.</p></div><button class="btn btn-lg btn-warning" onclick="app.requestLatePermission()" style="width:100%;margin-bottom:8px">Request Permission</button><button class="btn btn-lg btn-outline" onclick="app.goToDashboard()" style="width:100%">Back</button></div></div>`}
      async approvePermission(requestId){try{const req=await databases.getDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.permissionRequests,requestId);await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.permissionRequests,requestId,{status:'approved',approvedAt:new Date().toISOString()});const att=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,[Query.equal('studentId',req.studentId),Query.equal('checkInDate',req.requestDate)]);if(att.documents.length>0){await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,att.documents[0].$id,{permissionGranted:true})}await databases.createDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.notifications,ID.unique(),{recipientId:req.studentId,title:'✅ Approved',message:'Your supervisor approved your request.',type:'permission_approved',isRead:false,createdAt:new Date().toISOString()});this.showToast('✅ Approved!','success');await this.loadSupervisorData();await this.loadPermissionRequests();this.render()}catch(er){this.showToast(er.message,'error')}}
      async rejectPermission(requestId){try{const req=await databases.getDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.permissionRequests,requestId);await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.permissionRequests,requestId,{status:'rejected'});await databases.createDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.notifications,ID.unique(),{recipientId:req.studentId,title:'❌ Rejected',message:'Your supervisor rejected your request.',type:'permission_rejected',isRead:false,createdAt:new Date().toISOString()});this.showToast('Rejected!','success');await this.loadSupervisorData();await this.loadPermissionRequests();this.render()}catch(er){this.showToast(er.message,'error')}}

      showNewEntryForm(){if(!this.checkedInToday){this.showToast('⚠️ Check in first!','warning');return}const today=new Date().toISOString().split('T')[0];databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,[Query.equal('studentId',this.currentUser.$id),Query.equal('checkInDate',today)]).then(async r=>{if(r.documents.length>0){const rec=r.documents[0];if(rec.status==='late'&&!rec.permissionGranted){const perm=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.permissionRequests,[Query.equal('studentId',this.currentUser.$id),Query.equal('requestDate',today),Query.equal('status','approved')]);if(perm.documents.length>0){await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,rec.$id,{permissionGranted:true});this.isLateToday=false;this.showEntryForm=true;this.render();return}this.showPermissionPage=true;this.render();return}this.showEntryForm=true;this.render()}}).catch(()=>{this.showToast('Error','error')})}

      renderEntryForm(){return`<div class="glass-card" style="max-width:750px;margin:0 auto"><div class="flex-between" style="margin-bottom:14px"><h2><i class="fas fa-plus-circle"></i> New Logbook Entry</h2><button class="btn btn-outline btn-sm" onclick="app.goToDashboard()"><i class="fas fa-arrow-left"></i> Back</button></div><form onsubmit="app.saveEntry(event)"><div class="form-group"><label>1. Activity Title *</label><input type="text" id="activityTitle" placeholder="e.g., Food Safety Inspection" required></div><div class="grid grid-2"><div class="form-group"><label>2. Date *</label><input type="date" id="entryDate" required value="${new Date().toISOString().split('T')[0]}"></div><div class="form-group"><label>Week Number</label><input type="number" id="weekNumber" value="${this.currentWeek}" readonly></div></div><div class="form-group"><label>3. Objectives</label><textarea id="objectives" rows="2" placeholder="What were your learning objectives?"></textarea></div><div class="form-group"><label>4. Activities Performed *</label><textarea id="activitiesPerformed" rows="3" placeholder="Describe the activities you performed..." required></textarea></div><div class="form-group"><label>5. Description *</label><textarea id="description" rows="3" placeholder="Provide a detailed description..." required></textarea></div><div class="grid grid-2"><div class="form-group"><label>6. Skills Acquired</label><textarea id="skillsAcquired" rows="2" placeholder="New skills you gained..."></textarea></div><div class="form-group"><label>7. Challenges Faced</label><textarea id="challengesFaced" rows="2" placeholder="Challenges encountered..."></textarea></div></div><div class="grid grid-2"><div class="form-group"><label>8. Solutions Applied</label><textarea id="solutionsApplied" rows="2" placeholder="How you solved challenges..."></textarea></div><div class="form-group"><label>9. Lessons Learned</label><textarea id="lessonsLearned" rows="2" placeholder="Key takeaways..."></textarea></div></div><div class="form-group"><label>10. Recommendations</label><textarea id="recommendations" rows="2" placeholder="Your recommendations..."></textarea></div><div style="display:flex;gap:10px;margin-top:16px"><button type="submit" class="btn btn-lg" name="action" value="submit" style="flex:1"><i class="fas fa-paper-plane"></i> Submit for Review</button><button type="submit" class="btn btn-lg btn-outline" name="action" value="draft" style="flex:1"><i class="fas fa-save"></i> Save as Draft</button></div></form></div>`}

      async saveEntry(e){
        e.preventDefault();if(!this.checkedInToday){this.showToast('⚠️ Check in first!','warning');return}
        const btn=e.submitter;const orig=btn.innerHTML;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Saving...';btn.disabled=true;
        const now=new Date();const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        const status=btn.value==='submit'?'Pending Review':'Draft';
        const data={studentId:this.currentUser.$id,supervisorId:this.currentUser.supervisorId||'unassigned',entryDate:document.getElementById('entryDate').value,weekNumber:parseInt(document.getElementById('weekNumber').value),activityTitle:document.getElementById('activityTitle').value,objectives:document.getElementById('objectives').value,activitiesPerformed:document.getElementById('activitiesPerformed').value,description:document.getElementById('description').value,skillsAcquired:document.getElementById('skillsAcquired').value,challengesFaced:document.getElementById('challengesFaced').value,solutionsApplied:document.getElementById('solutionsApplied').value,lessonsLearned:document.getElementById('lessonsLearned').value,recommendations:document.getElementById('recommendations').value,status:status,submissionDay:days[now.getDay()],submissionDate:now.toISOString().split('T')[0],submissionTime:now.toTimeString().split(' ')[0],submittedAt:now.toISOString()};
        try{await databases.createDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.logbookEntries,ID.unique(),data);btn.innerHTML='<i class="fas fa-check"></i> Done!';setTimeout(()=>{this.showEntryForm=false;this.loadStudentData();this.render();this.showToast('✅ Entry submitted!','success')},500)}catch(er){btn.innerHTML=orig;btn.disabled=false;this.showToast('❌ '+er.message,'error')}
      }

      // ==================== STUDENT DASHBOARD (WITH PROFESSIONAL TABLE) ====================
      renderStudentDashboard(){
        if(!this.currentUser)return'';
        const approved=this.logbookEntries.filter(e=>e.status==='Approved').length;
        const pending=this.logbookEntries.filter(e=>e.status==='Pending Review').length;
        const rejected=this.logbookEntries.filter(e=>e.status==='Rejected');
        const mySup=this.supervisors.find(s=>s.$id===this.selectedSupervisor);
        
        return`

          ${this.isLateToday?`<div class="permission-alert"><i class="fas fa-clock" style="font-size:1.8rem;color:var(--warning)"></i><h3>Late Check-in</h3><p><a href="#" onclick="app.requestLatePermission()" style="color:var(--primary);font-weight:600">Request permission</a> to create entries.</p></div>`:''}

            <div class="glass-card stat-card" style="background:linear-gradient(135deg,#f59e0b,#d97706)"><div class="stat-value">${pending}</div><div class="stat-label">Pending</div></div>
          </div>
          
          ${rejected.length>0?`<div class="glass-card"><h3 style="color:var(--error)">Rejected</h3>${rejected.map(e=>`<div class="entry-item" style="border-color:#fecaca"><div style="flex:1"><strong>${e.activityTitle}</strong><p style="font-size:0.7rem;color:var(--error)">${e.supervisorComment||'No reason'}</p></div><button class="btn btn-sm btn-danger" onclick="app.deleteAndResubmit('${e.$id}')">Resubmit</button></div>`).join('')}</div>`:''}
          
          <!-- PROFESSIONAL RECENT ENTRIES TABLE -->
          <div class="glass-card" style="overflow:hidden">
            <div class="flex-between" style="margin-bottom:14px">
              <h3 style="font-size:0.95rem;font-weight:700;display:flex;align-items:center;gap:8px">
                <i class="fas fa-list-alt" style="color:var(--primary)"></i> Recent Entries
              </h3>
              <span style="font-size:0.7rem;color:#94a3b8;background:rgba(37,99,235,0.05);padding:4px 10px;border-radius:12px">
                ${this.logbookEntries.length} total
              </span>
            </div>
            <div class="entries-table">
              <table>
                <thead>
                  <tr>
                    <th style="text-align:left">📅 Date</th>
                    <th style="text-align:left">📋 Activity</th>
                    <th style="text-align:center">🏷️ Status</th>
                    <th style="text-align:center">📌 Week</th>
                  </tr>
                </thead>
                <tbody>
                  ${this.logbookEntries.length>0?this.logbookEntries.slice(0,10).map((e,i)=>`
                    <tr>
                      <td class="date-cell">
                        <div style="display:flex;align-items:center;gap:8px">
                          <div class="date-badge">${new Date(e.entryDate).getDate()}</div>
                          <div>
                            <div style="font-weight:600;font-size:0.8rem">${new Date(e.entryDate).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
                            <div style="font-size:0.62rem;color:#94a3b8">${new Date(e.entryDate).getFullYear()}</div>
                          </div>
                        </div>
                      </td>
                      <td class="activity-cell">
                        <div style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.activityTitle}">${e.activityTitle}</div>
                        ${e.objectives?`<div style="font-size:0.62rem;color:#94a3b8;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">🎯 ${e.objectives.substring(0,35)}</div>`:''}
                      </td>
                      <td style="text-align:center">
                        <span class="badge badge-${e.status?.toLowerCase().replace(' ','-')||'draft'}" style="font-size:0.68rem;padding:4px 10px;font-weight:600">${e.status||'Draft'}</span>
                      </td>
                      <td style="text-align:center">
                        <span class="week-badge">Week ${e.weekNumber}</span>
                      </td>

                  `).join(''):`
                    <tr>
                      <td colspan="4" style="padding:30px;text-align:center">
                        <div class="empty-state" style="padding:5px"><i class="fas fa-book-open" style="font-size:1.8rem;color:#cbd5e1"></i><p style="font-size:0.78rem;color:#94a3b8;margin-top:4px">No entries yet</p><button class="btn btn-sm" onclick="app.showNewEntryForm()" style="margin-top:6px"><i class="fas fa-plus"></i> Create First Entry</button></div>

            ${this.logbookEntries.length>10?`<div style="text-align:center;margin-top:10px"><p style="font-size:0.7rem;color:#94a3b8">Showing 10 of ${this.logbookEntries.length} entries</p></div>`:''}
          </div>
        `;
      }

      renderSupervisorDashboard(){const pending=this.logbookEntries.filter(e=>e.status==='Pending Review');const students=[...new Set(this.logbookEntries.map(e=>e.studentId))];return`<div class="grid"><div class="glass-card stat-card"><div class="stat-value">${students.length}</div><div class="stat-label">Students</div></div><div class="glass-card stat-card" style="background:linear-gradient(135deg,#f59e0b,#d97706)"><div class="stat-value">${pending.length}</div><div class="stat-label">Pending</div></div><div class="glass-card stat-card" style="background:linear-gradient(135deg,#10b981,#059669)"><div class="stat-value">${this.logbookEntries.filter(e=>e.status==='Approved').length}</div><div class="stat-label">Approved</div></div></div>${this.permissionRequests.length>0?`<div class="glass-card"><h3>Permission Requests</h3>${this.permissionRequests.map(req=>{const s=this.allUsers.find(u=>u.$id===req.studentId);return`<div class="entry-item"><div style="flex:1"><strong>${s?.fullName||req.studentId}</strong><p style="font-size:0.7rem">Late - ${new Date(req.requestDate).toLocaleDateString()}</p></div><div style="display:flex;gap:5px"><button class="btn btn-success btn-sm" onclick="app.approvePermission('${req.$id}')">Approve</button><button class="btn btn-danger btn-sm" onclick="app.rejectPermission('${req.$id}')">Reject</button></div></div>`}).join('')}</div>`:''}${pending.length>0?`<div class="glass-card"><h3>Pending Reviews</h3>${pending.map(e=>`<div class="entry-item"><div class="checkbox-cell"><input type="checkbox" ${this.selectedEntries.has(e.$id)?'checked':''} onchange="app.toggleEntrySelection('${e.$id}')"></div><div style="flex:1;cursor:pointer" onclick="app.previewEntry('${e.$id}')"><strong>${e.activityTitle}</strong><p style="font-size:0.7rem;margin:2px 0">Week ${e.weekNumber} | ${new Date(e.entryDate).toLocaleDateString()}</p>${e.objectives?`<p style="font-size:0.65rem;color:#64748b;margin:0">🎯 ${e.objectives.substring(0,50)}...</p>`:''}</div><div style="display:flex;gap:5px"><button class="btn btn-success btn-sm" onclick="event.stopPropagation();app.openSignaturePad('${e.$id}')">Sign</button><button class="btn btn-danger btn-sm" onclick="event.stopPropagation();app.rejectEntry('${e.$id}')">Reject</button></div></div>`).join('')}</div>`:'<div class="glass-card"><div class="empty-state"><i class="fas fa-check-circle"></i><p>No pending</p></div></div>'}`}
      renderAdminDashboard(){return`<div class="grid"><div class="glass-card stat-card"><div class="stat-value">${this.allUsers.filter(u=>u.role==='student').length}</div><div class="stat-label">Students</div></div><div class="glass-card stat-card" style="background:linear-gradient(135deg,#10b981,#059669)"><div class="stat-value">${this.supervisors.length}</div><div class="stat-label">Supervisors</div></div><div class="glass-card stat-card" style="background:linear-gradient(135deg,#f59e0b,#d97706)"><div class="stat-value">${this.allUsers.length}</div><div class="stat-label">Total</div></div></div><div class="glass-card"><h3>All Users</h3><table style="width:100%"><thead><tr><th>Name</th><th>Role</th><th>Actions</th></tr></thead><tbody>${this.allUsers.slice(0,30).map(u=>`<tr><td>${u.fullName}<br><small>${u.email}</small></td><td><span class="badge badge-${u.role==='student'?'info':'approved'}">${u.role}</span></td><td><button class="btn btn-sm btn-outline" onclick="app.toggleUserStatus('${u.$id}','${u.accountStatus}')">${u.accountStatus==='active'?'Disable':'Activate'}</button> <button class="btn btn-sm btn-danger" onclick="app.deleteUser('${u.$id}')">Delete</button></td></tr>`).join('')}</tbody></table></div><div class="glass-card"><h3>Recovery Requests</h3><div id="recoveryRequestsList">Loading...</div></div>`}

      renderProfile(){const user=this.currentUser;if(!user)return'';const mySup=this.supervisors.find(s=>s.$id===this.selectedSupervisor);return`<div class="glass-card"><h2>My Profile</h2><div class="grid" style="margin-top:10px"><div><p><strong>Name:</strong> ${user.fullName}</p><p><strong>Reg No:</strong> ${user.regNo}</p></div><div><p><strong>Institution:</strong> ${user.institution}</p><p><strong>Programme:</strong> ${user.programme}</p></div></div><div style="margin-top:14px;padding:12px;background:rgba(37,99,235,0.04);border-radius:10px"><h4>Supervisor</h4>${mySup?`<p><strong>${mySup.fullName}</strong> - ${mySup.email}</p>`:'<p style="color:var(--warning)">No supervisor.</p>'}</div></div><div class="glass-card"><h3>Select Supervisor</h3><div class="form-group"><input type="text" id="supervisorSearch" placeholder="Search..." oninput="app.searchSupervisor()" value="${this.searchSupervisorQuery}"></div><div style="max-height:180px;overflow-y:auto">${this.getFilteredSupervisors().map(sup=>`<div class="supervisor-card ${this.selectedSupervisor===sup.$id?'selected':''}" onclick="app.selectSupervisor('${sup.$id}')"><div class="flex-between"><div><strong>${sup.fullName}</strong><p style="font-size:0.7rem">${sup.email}</p></div>${this.selectedSupervisor===sup.$id?'<span class="badge badge-approved">Selected</span>':'<button class="btn btn-sm">Select</button>'}</div></div>`).join('')}</div></div>`}

      showHistory(){const modal=document.getElementById('modalAttendance');if(this.currentRole==='student'){const approved=this.logbookEntries.filter(e=>e.status==='Approved');const rejected=this.logbookEntries.filter(e=>e.status==='Rejected');modal.innerHTML=`<div class="modal-content"><div class="modal-header"><h3>History</h3><button class="close-btn" onclick="app.closeModal('modalAttendance')">✕</button></div><h4 style="color:var(--success)">Approved (${approved.length})</h4>${approved.map(e=>`<div style="padding:6px;border-bottom:1px solid var(--outline)"><strong>${e.activityTitle}</strong> - ${new Date(e.entryDate).toLocaleDateString()}</div>`).join('')||'<p>None</p>'}<h4 style="color:var(--error);margin-top:10px">Rejected (${rejected.length})</h4>${rejected.map(e=>`<div style="padding:6px;border-bottom:1px solid var(--outline)"><strong>${e.activityTitle}</strong> - ${e.supervisorComment||'No reason'}</div>`).join('')||'<p>None</p>'}</div>`}else{modal.innerHTML=`<div class="modal-content"><div class="modal-header"><h3>Review History</h3><button class="close-btn" onclick="app.closeModal('modalAttendance')">✕</button></div>${this.logbookEntries.filter(e=>e.status==='Approved').map(e=>{const s=this.allUsers.find(u=>u.$id===e.studentId);return`<div style="padding:6px;border-bottom:1px solid var(--outline)"><strong>${e.activityTitle}</strong> - ${s?.fullName||'Unknown'}</div>`}).join('')||'<p>No entries</p>'}</div>`}modal.classList.remove('hidden');modal.onclick=function(e){if(e.target===modal)app.closeModal('modalAttendance')}}

      openExportModal(){const modal=document.getElementById('modalExport');modal.innerHTML=`<div class="modal-content"><div class="modal-header"><h3>Export</h3><button class="close-btn" onclick="app.closeModal('modalExport')">✕</button></div><p>Word document (.doc) - No headers</p><div style="display:flex;flex-direction:column;gap:8px;margin-top:10px"><button class="btn btn-lg" onclick="app.exportEntries('weekly')">This Week</button><button class="btn btn-lg btn-outline" onclick="app.exportEntries('monthly')">This Month</button><button class="btn btn-lg btn-success" onclick="app.exportEntries('all')">All Entries</button></div></div>`;modal.classList.remove('hidden');modal.onclick=function(e){if(e.target===modal)app.closeModal('modalExport')}}
      exportEntries(type){let entries=[...this.logbookEntries];const now=new Date();if(type==='weekly'){const ws=new Date(now);ws.setDate(now.getDate()-now.getDay());entries=entries.filter(e=>new Date(e.entryDate)>=ws)}else if(type==='monthly'){const ms=new Date(now.getFullYear(),now.getMonth(),1);entries=entries.filter(e=>new Date(e.entryDate)>=ms)}if(entries.length===0){this.showToast('No entries!','warning');return}let c=`HAS FIELD SYSTEM - TRAINING LOGBOOK\n${'='.repeat(50)}\n\nExport Date: ${now.toLocaleDateString()}\n${'='.repeat(50)}\n\n`;entries.forEach((e,i)=>{c+=`ENTRY ${i+1}\n${'-'.repeat(40)}\nDate: ${new Date(e.entryDate).toLocaleDateString()}\nWeek: ${e.weekNumber}\nStatus: ${e.status||'Draft'}\nActivity: ${e.activityTitle||'N/A'}\n`;if(e.objectives)c+=`\n🎯 OBJECTIVES:\n${e.objectives}\n`;c+=`\n📋 ACTIVITIES:\n${e.activitiesPerformed||'N/A'}\n\n📝 DESCRIPTION:\n${e.description||'N/A'}\n`;if(e.skillsAcquired)c+=`\n💡 SKILLS:\n${e.skillsAcquired}\n`;if(e.challengesFaced)c+=`\n⚠️ CHALLENGES:\n${e.challengesFaced}\n`;if(e.solutionsApplied)c+=`\n🔧 SOLUTIONS:\n${e.solutionsApplied}\n`;if(e.lessonsLearned)c+=`\n📖 LESSONS:\n${e.lessonsLearned}\n`;if(e.recommendations)c+=`\n💬 RECOMMENDATIONS:\n${e.recommendations}\n`;c+=`\n${'='.repeat(50)}\n\n`});c+=`End of Report - HAS Field System`;const blob=new Blob([c],{type:'application/msword'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`HAS_Logbook_${type}_${now.toISOString().split('T')[0]}.doc`;document.body.appendChild(a);a.click();document.body.removeChild(a);this.closeModal('modalExport');this.showToast(`${entries.length} entries exported!`,'success')}

      openChecklistModal(){const modal=document.getElementById('modalChecklist');const fc={"1. Food Hygiene & Safety":{icon:"fa-utensils",items:["Inspection of meat & carriage facilities","Abattoir hygiene standards inspection","Post mortem carcass inspection","Meat carriage vehicle inspection","Butcheries inspection","Fish carriage vehicle inspection","Food premise registration & licensing","Restaurants & food vendors inspection","Food shops & supermarkets inspection","Cereals harvesting & storage monitoring","Condemned food disposal & certification","Healthcare waste management","Incinerator & waste pit assessment"]},"2. Occupational Health & Safety":{icon:"fa-hard-hat",items:["Health and Safety Assessment in Manufacturing Industry","Health and Safety Assessment in Health Facilities","Health and Safety Assessment in Construction Sites","Health and Safety Assessment in Mining","Health and Safety Assessment in Agriculture","Health and Safety Assessment in Informal Garages","Health and Safety Assessment in Carpentry Workshops","Health and Safety Assessment in Flour Mills","Health and Safety Assessment in Quarrying"]},"3. Environmental Health Inspection":{icon:"fa-tree",items:["Inspection of Schools","Inspection of Prison facilities","Inspection of Markets","Inspection of Bars","Inspection of Pombe Shops","Inspection of Recreational Grounds"]},"4. Disease Prevention & Control":{icon:"fa-shield-virus",items:["Disease management using guidelines","Malaria vector control interventions","Disease surveillance & reporting","Outbreak investigation","Infectious disease case follow-up","Immunization promotion","Vaccine cold chain management","Vaccine ordering & distribution","Immunization sessions & records","Mortuary inspections","Corpse preservation procedures","Cemetery inspection & recommendations","Unclaimed bodies & exhumation procedures","Port health functions"]},"5. Buildings & Land Management":{icon:"fa-building",items:["Land-use survey application","Lighting & ventilation assessment","Building standards adherence","Building plans scrutinization"]}};let html=`<div class="modal-content"><div class="modal-header"><h3>PT Checklist</h3><button class="close-btn" onclick="app.closeModal('modalChecklist')">✕</button></div><div style="max-height:55vh;overflow-y:auto">`;for(const[cat,data]of Object.entries(fc)){html+=`<h4 style="background:rgba(37,99,235,0.04);padding:8px"><i class="fas ${data.icon}"></i> ${cat}</h4>`;data.items.forEach(i=>{html+=`<div style="padding:3px 10px;font-size:0.75rem">• ${i}</div>`})}html+=`</div></div>`;modal.innerHTML=html;modal.classList.remove('hidden');modal.onclick=function(e){if(e.target===modal)app.closeModal('modalChecklist')}}

      showCreateSupervisorForm(){const modal=document.getElementById('modalSupervisor');modal.innerHTML=`<div class="modal-content"><div class="modal-header"><h3>Create Supervisor</h3><button class="close-btn" onclick="app.closeModal('modalSupervisor')">✕</button></div><form onsubmit="app.createSupervisor(event)"><div class="form-group"><label>Full Name *</label><input type="text" id="supFullName" required></div><div class="form-group"><label>Email *</label><input type="email" id="supEmail" required></div><div class="form-group"><label>Phone *</label><input type="text" id="supPhone" required></div><div class="form-group"><label>Password *</label><input type="password" id="supPassword" required></div><div class="form-group"><label>Confirm *</label><input type="password" id="supConfirmPassword" required></div><button type="submit" class="btn btn-lg btn-success" style="width:100%">Create</button></form></div>`;modal.classList.remove('hidden');modal.onclick=function(e){if(e.target===modal)app.closeModal('modalSupervisor')}}
      async createSupervisor(e){e.preventDefault();if(document.getElementById('supPassword').value!==document.getElementById('supConfirmPassword').value){this.showToast('Passwords mismatch!','error');return}this.showLoading('Creating...');await this.delay(2000);try{const email=document.getElementById('supEmail').value;const name=document.getElementById('supFullName').value;await account.create(ID.unique(),email,document.getElementById('supPassword').value,name);await account.createEmailSession(email,document.getElementById('supPassword').value);const user=await account.get();await databases.createDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.users,user.$id,{fullName:name,email:email,phone:document.getElementById('supPhone').value,role:'supervisor',accountStatus:'active',regNo:'SUP-'+Date.now()});this.hideLoading();this.closeModal('modalSupervisor');this.showToast('✅ Supervisor created!','success');await this.loadInitialData();this.render()}catch(er){this.hideLoading();this.showToast('❌ '+er.message,'error')}}

      openSignaturePad(entryId){this.signatureEntryId=entryId;const modal=document.getElementById('modalSignature');modal.innerHTML=`<div class="modal-content" style="max-width:420px"><div class="modal-header"><h3>Signature</h3><button class="close-btn" onclick="app.closeModal('modalSignature');app.signatureEntryId=null">✕</button></div><canvas id="sigCanvas" class="signature-canvas" width="400" height="180"></canvas><div style="display:flex;gap:8px;margin-top:8px;justify-content:center"><button class="btn btn-sm btn-outline" onclick="app.clearSignature()">Clear</button><button class="btn btn-sm btn-success" onclick="app.saveSignature()">Save</button></div></div>`;modal.classList.remove('hidden');setTimeout(()=>{this.signatureCanvas=document.getElementById('sigCanvas');if(this.signatureCanvas){this.signatureCtx=this.signatureCanvas.getContext('2d');this.signatureCtx.strokeStyle='#2563eb';this.signatureCtx.lineWidth=2;this.signatureCanvas.onmousedown=(e)=>{this.isDrawing=true;const rect=this.signatureCanvas.getBoundingClientRect();this.signatureCtx.beginPath();this.signatureCtx.moveTo(e.clientX-rect.left,e.clientY-rect.top)};this.signatureCanvas.onmousemove=(e)=>{if(!this.isDrawing)return;const rect=this.signatureCanvas.getBoundingClientRect();this.signatureCtx.lineTo(e.clientX-rect.left,e.clientY-rect.top);this.signatureCtx.stroke()};this.signatureCanvas.onmouseup=()=>{this.isDrawing=false};this.signatureCanvas.ontouchstart=(e)=>{e.preventDefault();this.isDrawing=true;const touch=e.touches[0];const rect=this.signatureCanvas.getBoundingClientRect();this.signatureCtx.beginPath();this.signatureCtx.moveTo(touch.clientX-rect.left,touch.clientY-rect.top)};this.signatureCanvas.ontouchmove=(e)=>{e.preventDefault();if(!this.isDrawing)return;const touch=e.touches[0];const rect=this.signatureCanvas.getBoundingClientRect();this.signatureCtx.lineTo(touch.clientX-rect.left,touch.clientY-rect.top);this.signatureCtx.stroke()};this.signatureCanvas.ontouchend=()=>{this.isDrawing=false}}},100)}
      clearSignature(){if(this.signatureCtx&&this.signatureCanvas)this.signatureCtx.clearRect(0,0,this.signatureCanvas.width,this.signatureCanvas.height)}
      async saveSignature(){if(!this.signatureCanvas||!this.signatureEntryId)return;const data=this.signatureCanvas.toDataURL();try{await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.logbookEntries,this.signatureEntryId,{status:'Approved',supervisorSignature:data,reviewedAt:new Date().toISOString()});this.closeModal('modalSignature');this.signatureEntryId=null;this.showToast('✅ Approved!','success');await this.loadSupervisorData();this.render()}catch(er){this.showToast('❌ '+er.message,'error')}}

      previewEntry(entryId){const entry=this.logbookEntries.find(e=>e.$id===entryId);if(!entry)return;const student=this.allUsers.find(u=>u.$id===entry.studentId);const modal=document.getElementById('modalAttendance');modal.innerHTML=`<div class="modal-content" style="max-width:680px"><div class="modal-header"><h3>Review Entry</h3><button class="close-btn" onclick="app.closeModal('modalAttendance')">✕</button></div><div style="max-height:55vh;overflow-y:auto"><div style="background:rgba(37,99,235,0.05);padding:10px;border-radius:8px;margin-bottom:12px"><p><strong>Student:</strong> ${student?.fullName||'Unknown'} (${student?.regNo||'N/A'})</p><p><strong>Date:</strong> ${new Date(entry.entryDate).toLocaleDateString()} | <strong>Week:</strong> ${entry.weekNumber}</p></div><p><strong>📌 ${entry.activityTitle}</strong></p>${entry.objectives?`<p><strong>🎯 Objectives:</strong> ${entry.objectives}</p>`:''}<p><strong>📋 Activities:</strong> ${entry.activitiesPerformed}</p><p><strong>📝 Description:</strong> ${entry.description}</p>${entry.skillsAcquired?`<p><strong>💡 Skills:</strong> ${entry.skillsAcquired}</p>`:''}${entry.challengesFaced?`<p><strong>⚠️ Challenges:</strong> ${entry.challengesFaced}</p>`:''}${entry.solutionsApplied?`<p><strong>🔧 Solutions:</strong> ${entry.solutionsApplied}</p>`:''}${entry.lessonsLearned?`<p><strong>📖 Lessons:</strong> ${entry.lessonsLearned}</p>`:''}${entry.recommendations?`<p><strong>💬 Recommendations:</strong> ${entry.recommendations}</p>`:''}</div><div style="display:flex;gap:8px;margin-top:14px;padding-top:10px;border-top:1px solid var(--outline);justify-content:flex-end"><button class="btn btn-danger" onclick="app.rejectEntry('${entry.$id}')">Reject</button><button class="btn btn-success" onclick="app.closeModal('modalAttendance');app.openSignaturePad('${entry.$id}')">Sign & Approve</button></div></div>`;modal.classList.remove('hidden');modal.onclick=function(e){if(e.target===modal)app.closeModal('modalAttendance')}}
      async rejectEntry(entryId){const comment=prompt('Reason:');if(!comment)return;try{await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.logbookEntries,entryId,{status:'Rejected',supervisorComment:comment});this.closeModal('modalAttendance');this.showToast('Rejected!','success');await this.loadSupervisorData();this.render()}catch(er){this.showToast('❌ '+er.message,'error')}}

      toggleEntrySelection(id){if(this.selectedEntries.has(id))this.selectedEntries.delete(id);else this.selectedEntries.add(id);this.render()}
      selectAllEntries(){if(this.selectedEntries.size===this.logbookEntries.length)this.selectedEntries.clear();else this.logbookEntries.forEach(e=>this.selectedEntries.add(e.$id));this.render()}
      async bulkDeleteEntries(){if(this.selectedEntries.size===0){this.showToast('Nothing selected!','warning');return}if(!confirm(`Delete ${this.selectedEntries.size} entries?`))return;try{for(const id of this.selectedEntries){await databases.deleteDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.logbookEntries,id)}this.selectedEntries.clear();if(this.currentRole==='student')await this.loadStudentData();else await this.loadSupervisorData();this.render();this.showToast('Deleted!','success')}catch(e){this.showToast('❌ '+e.message,'error')}}
      selectAllSupervisors(){if(this.selectedEntries.size===this.supervisors.length)this.selectedEntries.clear();else this.supervisors.forEach(s=>this.selectedEntries.add(s.$id));this.render()}
      async bulkDeleteSupervisors(){if(this.selectedEntries.size===0){this.showToast('Nothing selected!','warning');return}if(!confirm(`Delete ${this.selectedEntries.size} supervisors?`))return;try{for(const id of this.selectedEntries){await databases.deleteDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.users,id)}this.selectedEntries.clear();await this.loadInitialData();this.render();this.showToast('Deleted!','success')}catch(e){this.showToast('❌ '+e.message,'error')}}
      async deleteAndResubmit(entryId){if(!confirm('Delete and create new?'))return;try{await databases.deleteDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.logbookEntries,entryId);await this.loadStudentData();this.showEntryForm=true;this.render();this.showToast('Create new entry!','success')}catch(er){this.showToast('❌ '+er.message,'error')}}
      async deleteUser(uid){if(!confirm('Delete permanently?'))return;try{await databases.deleteDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.users,uid);await this.loadInitialData();this.render();this.showToast('Deleted!','success')}catch(e){this.showToast('❌ '+e.message,'error')}}

      // ==================== AUTH UI ====================
      renderAuth(){return`<div class="auth-wrapper"><div class="auth-container"><div class="auth-card"><div class="auth-logo"><img src="${LOGO_URL}" alt="HAS" onerror="this.style.display='none'"><h1>HAS Field System</h1><p>Student Training Logbook</p></div>${this.currentView==='login'?this.renderLoginForm():this.currentView==='register'?this.renderRegisterForm():this.renderForgotPasswordForm()}</div></div></div>`}
      renderLoginForm(){return`<form onsubmit="app.handleLogin(event)"><div class="form-group"><label>Email</label><input type="email" id="loginEmail" required></div><div class="form-group"><label>Password</label><div class="password-wrapper"><input type="password" id="loginPassword" required><button type="button" class="password-toggle" onclick="togglePassword('loginPassword',this.firstElementChild)"><i class="fas fa-eye"></i></button></div></div><button type="submit" class="btn-auth">Sign In</button></form><div class="auth-links"><p>Don't have an account? <a onclick="app.switchView('register')">Create Account</a></p><p><a onclick="app.switchView('forgot')">Forgot Password?</a></p></div>`}
      renderRegisterForm(){return`<form onsubmit="app.handleRegister(event)"><div class="form-group"><label>Full Name *</label><input type="text" id="regFullName" required></div><div class="grid grid-2"><div class="form-group"><label>Reg Number *</label><input type="text" id="regRegNo" required></div><div class="form-group"><label>Phone *</label><input type="tel" id="regPhone" required></div></div><div class="form-group"><label>Email *</label><input type="email" id="regEmail" required></div><div class="grid grid-2"><div class="form-group"><label>Institution *</label><input type="text" id="regInstitution" required></div><div class="form-group"><label>Programme *</label><input type="text" id="regProgramme" required></div></div><div class="grid grid-2"><div class="form-group"><label>Region *</label><select id="regRegion" onchange="app.updateDistricts()" required><option value="">Select</option></select></div><div class="form-group"><label>District *</label><select id="regDistrict" required><option value="">Select</option></select></div></div><div class="form-group"><label>Gender *</label><select id="regGender" required><option value="">Select</option><option>Male</option><option>Female</option></select></div><div class="grid grid-2"><div class="form-group"><label>Password *</label><div class="password-wrapper"><input type="password" id="regPassword" required><button type="button" class="password-toggle" onclick="togglePassword('regPassword',this.firstElementChild)"><i class="fas fa-eye"></i></button></div></div><div class="form-group"><label>Confirm *</label><div class="password-wrapper"><input type="password" id="regConfirmPassword" required><button type="button" class="password-toggle" onclick="togglePassword('regConfirmPassword',this.firstElementChild)"><i class="fas fa-eye"></i></button></div></div></div><button type="submit" class="btn-auth">Create Account</button></form><div class="auth-links"><p>Already have an account? <a onclick="app.switchView('login')">Sign In</a></p></div>`}
      renderForgotPasswordForm(){return`<form onsubmit="app.handleForgotPassword(event)"><div style="margin-bottom:12px;padding:10px;background:rgba(37,99,235,0.04);border-radius:10px"><p style="font-size:0.78rem">Enter registration number and email.</p></div><div class="form-group"><label>Reg Number *</label><input type="text" id="forgotRegNo" required></div><div class="form-group"><label>Email *</label><input type="email" id="forgotEmail" required></div><button type="submit" class="btn-auth">Request Recovery</button></form><div id="recoverySection" class="hidden" style="margin-top:16px;padding-top:12px;border-top:1px solid var(--outline)"><h4>Reset Password</h4><div class="form-group"><label>Temp Password</label><input type="text" id="tempPassword"></div><div class="form-group"><label>New Password</label><div class="password-wrapper"><input type="password" id="newPassword"><button type="button" class="password-toggle" onclick="togglePassword('newPassword',this.firstElementChild)"><i class="fas fa-eye"></i></button></div></div><div class="form-group"><label>Confirm</label><div class="password-wrapper"><input type="password" id="confirmNewPassword"><button type="button" class="password-toggle" onclick="togglePassword('confirmNewPassword',this.firstElementChild)"><i class="fas fa-eye"></i></button></div></div><button type="button" class="btn-auth" style="background:var(--success)" onclick="app.resetPassword()">Reset</button></div><div class="auth-links"><p><a onclick="app.switchView('login')">Back to Sign In</a></p></div>`}

      async handleLogin(e){e.preventDefault();this.showLoading('Signing in...');await this.delay(3000);try{await account.createEmailSession(document.getElementById('loginEmail').value,document.getElementById('loginPassword').value);this.hideLoading();await this.checkSession();this.showToast('✅ Welcome!','success')}catch(er){this.hideLoading();this.showToast('❌ '+er.message,'error')}}
      async handleRegister(e){e.preventDefault();if(document.getElementById('regPassword').value!==document.getElementById('regConfirmPassword').value){this.showToast('❌ Passwords mismatch!','error');return}this.showLoading('Creating account...');await this.delay(4000);try{await account.create(ID.unique(),document.getElementById('regEmail').value,document.getElementById('regPassword').value,document.getElementById('regFullName').value);await account.createEmailSession(document.getElementById('regEmail').value,document.getElementById('regPassword').value);const user=await account.get();await databases.createDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.users,user.$id,{fullName:document.getElementById('regFullName').value,regNo:document.getElementById('regRegNo').value,email:document.getElementById('regEmail').value,phone:document.getElementById('regPhone').value,institution:document.getElementById('regInstitution').value,programme:document.getElementById('regProgramme').value,region:document.getElementById('regRegion').value,district:document.getElementById('regDistrict').value,gender:document.getElementById('regGender').value,role:'student',supervisorId:null,accountStatus:'active'});this.hideLoading();await this.checkSession();this.showToast('🎉 Registration successful!','success')}catch(er){this.hideLoading();this.showToast('❌ '+er.message,'error')}}
      async handleForgotPassword(e){e.preventDefault();this.showLoading('Submitting...');await this.delay(2000);try{await databases.createDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.recoveryRequests,ID.unique(),{studentId:'pending',regNo:document.getElementById('forgotRegNo').value,email:document.getElementById('forgotEmail').value,temporaryPassword:'',status:'pending',expiresAt:new Date(Date.now()+86400000).toISOString(),createdAt:new Date().toISOString()});this.hideLoading();document.getElementById('recoverySection').classList.remove('hidden');this.showToast('✅ Request submitted!','success')}catch(er){this.hideLoading();this.showToast('❌ '+er.message,'error')}}
      async resetPassword(){if(document.getElementById('newPassword').value!==document.getElementById('confirmNewPassword').value){this.showToast('❌ Passwords mismatch!','error');return}this.showLoading('Resetting...');await this.delay(2000);try{const reqs=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.recoveryRequests,[Query.equal('regNo',document.getElementById('forgotRegNo').value),Query.equal('status','generated')]);if(!reqs.documents.length){this.hideLoading();this.showToast('❌ No valid request.','error');return}const r=reqs.documents[0];if(r.temporaryPassword!==document.getElementById('tempPassword').value){this.hideLoading();this.showToast('❌ Invalid temp password.','error');return}await account.updatePassword(document.getElementById('newPassword').value,document.getElementById('tempPassword').value);await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.recoveryRequests,r.$id,{status:'used',usedAt:new Date().toISOString()});this.hideLoading();this.showToast('✅ Password reset!','success');this.switchView('login')}catch(er){this.hideLoading();this.showToast('❌ '+er.message,'error')}}

      switchView(v){this.currentView=v;this.render();setTimeout(()=>this.setupRegionDropdown(),100)}
      setupRegionDropdown(){const s=document.getElementById('regRegion');if(s){s.innerHTML='<option value="">Select Region</option>';Object.keys(tanzaniaData).sort().forEach(r=>s.innerHTML+=`<option value="${r}">${r}</option>`)}}
      updateDistricts(){const r=document.getElementById('regRegion')?.value;const d=document.getElementById('regDistrict');if(d){d.innerHTML='<option value="">Select District</option>';if(r&&tanzaniaData[r])tanzaniaData[r].forEach(dd=>d.innerHTML+=`<option value="${dd}">${dd}</option>`)}}
      toggleDarkMode(){this.darkMode=!this.darkMode;document.body.classList.toggle('dark');localStorage.setItem('darkMode',this.darkMode);this.renderSideMenu()}
      getFilteredSupervisors(){if(!this.searchSupervisorQuery)return this.supervisors;const q=this.searchSupervisorQuery.toLowerCase();return this.supervisors.filter(s=>s.fullName?.toLowerCase().includes(q)||s.email?.toLowerCase().includes(q))}
      searchSupervisor(){this.searchSupervisorQuery=document.getElementById('supervisorSearch')?.value||'';this.render()}
      async selectSupervisor(sid){try{await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.users,this.currentUser.$id,{supervisorId:sid});this.selectedSupervisor=sid;this.showToast('✅ Supervisor selected!','success');this.render()}catch(er){this.showToast('❌ '+er.message,'error')}}
      async toggleUserStatus(uid,cs){const ns=cs==='active'?'disabled':'active';try{await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.users,uid,{accountStatus:ns});this.showToast(`✅ User ${ns==='active'?'activated':'disabled'}!`,'success');await this.loadInitialData();this.render()}catch(e){this.showToast('❌ '+e.message,'error')}}
      async logout(){try{await account.deleteSession('current')}catch(e){}this.resetState();this.hideAll();document.getElementById('mainContent').innerHTML='';localStorage.removeItem('cookieFallback');this.currentView='login';this.render();this.showToast('👋 Logged out','success')}

      async markAllNotificationsAsRead(){this.unreadNotifications=0;this.updateNotifBadge();if(this.currentUser&&this.notifications.length>0){try{for(const n of this.notifications){if(!n.isRead){await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.notifications,n.$id,{isRead:true});n.isRead=true}}}catch(e){}}}
      openNotificationDrawer(){const d=document.getElementById('drawer');const o=document.getElementById('overlay');this.markAllNotificationsAsRead();d.innerHTML=`<div class="drawer-header"><h3 style="font-size:0.85rem"><i class="fas fa-bell" style="font-size:0.8rem"></i> Notifications</h3><button class="drawer-close" onclick="closeDrawer()" style="width:26px;height:26px;font-size:0.8rem">✕</button></div><div>${this.notifications.length>0?this.notifications.map(n=>`<div style="padding:7px 9px;border-left:2px solid var(--primary);margin-bottom:3px;border-radius:4px;font-size:0.73rem;${n.isRead?'opacity:0.6':''}"><strong style="font-size:0.73rem">${n.title}</strong><p style="font-size:0.68rem;margin:2px 0;color:var(--on-surface);opacity:0.8">${n.message}</p><small style="color:#94a3b8;font-size:0.6rem">${new Date(n.createdAt).toLocaleString()}</small></div>`).join(''):'<div class="empty-state" style="padding:18px"><i class="fas fa-bell-slash" style="font-size:1.6rem"></i><p style="font-size:0.75rem">No notifications</p></div>'}</div>`;d.classList.add('open');o.classList.add('active')}

      showToast(msg,type='info'){const existing=document.querySelectorAll('.toast-msg');existing.forEach(t=>{t.style.opacity='0';t.style.transform='translateX(120%)';setTimeout(()=>t.remove(),300)});const t=document.createElement('div');t.className='toast-msg';const colors={error:'#ef4444',success:'#10b981',warning:'#f59e0b',info:'#2563eb'};const icons={error:'✕',success:'✓',warning:'⚠',info:'ℹ'};t.style.cssText=`position:fixed;bottom:20px;right:20px;padding:7px 12px;background:${colors[type]||colors.info};color:#fff;border-radius:18px;z-index:10001;font-size:0.73rem;font-weight:500;box-shadow:0 4px 15px rgba(0,0,0,0.2);max-width:260px;cursor:pointer;transition:all 0.3s ease;animation:toastIn 0.3s ease;display:flex;align-items:center;gap:6px;letter-spacing:0.2px`;t.innerHTML=`<span style="font-size:0.65rem;width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0">${icons[type]||icons.info}</span><span style="flex:1">${msg}</span>`;t.onclick=()=>{t.style.opacity='0';t.style.transform='translateX(120%)';setTimeout(()=>t.remove(),300)};document.body.appendChild(t);setTimeout(()=>{if(t.parentNode){t.style.opacity='0';t.style.transform='translateX(120%)';setTimeout(()=>{if(t.parentNode)t.remove()},300)}},3500)}

      showRecoveryRequests(){this.loadRecoveryRequests()}
      async loadRecoveryRequests(){try{const reqs=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.recoveryRequests,[Query.orderDesc('createdAt')]);const el=document.getElementById('recoveryRequestsList');if(el)el.innerHTML=reqs.documents.map(r=>`<div style="padding:8px;margin-bottom:4px;border:1px solid var(--outline);border-radius:6px"><p><strong>Reg:</strong> ${r.regNo} | <strong>Status:</strong> <span class="badge badge-${r.status==='pending'?'pending':'approved'}">${r.status}</span></p>${r.status==='pending'?`<button class="btn btn-success btn-sm" onclick="app.generateTempPassword('${r.$id}')">Generate</button>`:r.temporaryPassword?`<p><strong>Temp:</strong> <code>${r.temporaryPassword}</code></p>`:''}</div>`).join('')||'<p>No requests</p>'}catch(e){}}
      async generateTempPassword(id){const p=Math.random().toString(36).slice(-8);await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.recoveryRequests,id,{temporaryPassword:p,status:'generated'});this.showToast(`🔑 Password: ${p}`,'success');this.loadRecoveryRequests()}
    }

    function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('overlay').classList.remove('active');app.updateNotifBadge()}
    const app=new AppState();window.app=app;window.closeDrawer=closeDrawer;app.initialize();
  </script>
</body>
</html>
