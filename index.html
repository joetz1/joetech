      hideNavBar(){document.getElementById('topNav').classList.remove('visible');document.body.classList.remove('logged-in');document.getElementById('sideMenu').classList.remove('open');document.getElementById('menuOverlay').classList.remove('active');document.getElementById('drawer').classList.remove('open');document.getElementById('overlay').classList.remove('active');['checklistModal','createSupervisorModal','exportModal','attendanceModal','signatureModal'].forEach(id=>{const el=document.getElementById(id);if(el){el.classList.add('hidden');el.innerHTML=''}})}
      
      renderSideMenu(){
        const mc=document.getElementById('menuContent');const rb=document.getElementById('roleBadge');if(!mc)return;
        if(rb)rb.textContent=this.currentRole==='student'?'Student':this.currentRole==='supervisor'?'Supervisor':this.currentRole==='admin'?'Admin':'Guest';
        let html='';
        if(this.currentUser){
          if(this.currentRole==='student'){
            html+=`<div class="menu-section">Student Menu</div>
              <div class="menu-item ${!this.showEntryForm&&!this.showProfile&&!this.showPermissionPage?'active':''}" onclick="app.goToDashboard();app.toggleSideMenu()"><i class="fas fa-th-large"></i> Dashboard</div>
              <div class="menu-item ${this.showEntryForm?'active':''}" onclick="app.showNewEntryForm();app.toggleSideMenu()"><i class="fas fa-plus-circle"></i> New Entry</div>
              <div class="menu-item ${this.showProfile?'active':''}" onclick="app.showProfilePage();app.toggleSideMenu()"><i class="fas fa-user"></i> Profile & Supervisor</div>
              <div class="menu-item" onclick="app.showHistory();app.toggleSideMenu()"><i class="fas fa-history"></i> History</div>
              <div class="menu-item" onclick="app.openExportModal();app.toggleSideMenu()"><i class="fas fa-download"></i> Export Entries</div>
              <div class="menu-divider"></div><div class="menu-section">Attendance</div>
              <div class="menu-item" onclick="app.checkIn();app.toggleSideMenu()"><i class="fas fa-clock"></i> Check In</div>
              <div class="menu-item" onclick="app.checkOut();app.toggleSideMenu()"><i class="fas fa-sign-out-alt"></i> Check Out</div>`;
          }else if(this.currentRole==='supervisor'){
            html+=`<div class="menu-section">Supervisor Menu</div>
              <div class="menu-item active" onclick="app.goToDashboard();app.toggleSideMenu()"><i class="fas fa-th-large"></i> Dashboard</div>
              <div class="menu-item" onclick="app.showHistory();app.toggleSideMenu()"><i class="fas fa-history"></i> History</div>
              <div class="menu-item" onclick="app.openExportModal();app.toggleSideMenu()"><i class="fas fa-download"></i> Export Entries</div>
              <div class="menu-divider"></div><div class="menu-section">Bulk Actions</div>
              <div class="menu-item" onclick="app.selectAllEntries();app.toggleSideMenu()"><i class="fas fa-check-square"></i> Select All (${this.selectedEntries.size})</div>
              <div class="menu-item danger" onclick="app.bulkDeleteEntries();app.toggleSideMenu()"><i class="fas fa-trash-alt"></i> Delete Selected</div>`;
          }else if(this.currentRole==='admin'){
            html+=`<div class="menu-section">Admin Menu</div>
              <div class="menu-item active" onclick="app.goToDashboard();app.toggleSideMenu()"><i class="fas fa-th-large"></i> Dashboard</div>
              <div class="menu-item" onclick="app.showCreateSupervisorForm();app.toggleSideMenu()"><i class="fas fa-user-tie"></i> Create Supervisor</div>
              <div class="menu-item" onclick="app.showRecoveryRequests();app.toggleSideMenu()"><i class="fas fa-key"></i> Recovery Requests</div>
              <div class="menu-item" onclick="app.openExportModal();app.toggleSideMenu()"><i class="fas fa-download"></i> Export Data</div>
              <div class="menu-divider"></div><div class="menu-section">Admin Actions</div>
              <div class="menu-item" onclick="app.selectAllSupervisors();app.toggleSideMenu()"><i class="fas fa-check-square"></i> Select Supervisors</div>
              <div class="menu-item danger" onclick="app.bulkDeleteSupervisors();app.toggleSideMenu()"><i class="fas fa-trash-alt"></i> Delete Supervisors</div>`;
          }
          html+=`<div class="menu-divider"></div><div class="menu-item" onclick="app.openNotificationDrawer();app.toggleSideMenu()"><i class="fas fa-bell"></i> Notifications ${this.unreadNotifications>0?`<span class="badge" style="background:red;color:white;margin-left:auto;">${this.unreadNotifications}</span>`:''}</div>`;
        }
        html+=`<div class="menu-divider"></div><div class="menu-item green" onclick="app.openChecklistModal()"><i class="fas fa-clipboard-list"></i> PT Field Checklist</div>`;
        if(this.currentUser){html+=`<div class="menu-divider"></div><div class="menu-section">Settings</div><div class="menu-item" onclick="app.toggleDarkMode()"><i class="fas fa-moon"></i> Dark Mode: ${this.darkMode?'ON':'OFF'}</div><div class="menu-item danger" onclick="app.logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>`;}
        mc.innerHTML=html;
      }
      
      updateTopBar(){const ud=document.getElementById('userNameDisplay');if(this.currentUser&&ud)ud.textContent=this.currentUser.fullName?.split(' ')[0]||'User';this.updateNotifBadge()}
      updateNotifBadge(){const b=document.getElementById('notifBadge');if(b){if(this.unreadNotifications>0){b.textContent=this.unreadNotifications>99?'99+':this.unreadNotifications;b.classList.remove('hidden')}else{b.classList.add('hidden')}}}
      async checkSession(){try{const u=await account.get();await this.fetchUserData(u)}catch(e){this.resetState();this.hideNavBar()}this.render()}
      async fetchUserData(user){try{const r=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.users,[Query.equal('email',user.email)]);if(r.documents.length>0){this.currentUser=r.documents[0];this.currentRole=this.currentUser.role;this.selectedSupervisor=this.currentUser.supervisorId;await this.loadInitialData()}}catch(e){this.resetState()}}
      async loadInitialData(){if(!this.currentUser)return;try{const[sups,allUsers]=await Promise.all([databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.users,[Query.equal('role','supervisor')]),databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.users,[Query.limit(200)])]);this.supervisors=sups.documents;this.allUsers=allUsers.documents;await this.loadNotifications();if(this.currentRole==='student'){await this.loadStudentData();await this.checkTodayAttendance()}else if(this.currentRole==='supervisor'){await this.loadSupervisorData();await this.loadPermissionRequests()}}catch(e){}}
      async checkTodayAttendance(){const today=new Date().toISOString().split('T')[0];try{const records=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,[Query.equal('studentId',this.currentUser.$id),Query.equal('checkInDate',today)]);if(records.documents.length>0){this.checkedInToday=true}}catch(e){this.checkedInToday=false}}
      async loadNotifications(){if(!this.currentUser)return;try{const r=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.notifications,[Query.equal('recipientId',this.currentUser.$id),Query.orderDesc('createdAt'),Query.limit(50)]);this.notifications=r.documents;this.unreadNotifications=this.notifications.filter(n=>!n.isRead).length;this.updateNotifBadge()}catch(e){}}
      async loadStudentData(){if(!this.currentUser)return;try{const[e,a]=await Promise.all([databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.logbookEntries,[Query.equal('studentId',this.currentUser.$id),Query.orderDesc('entryDate'),Query.limit(100)]),databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,[Query.equal('studentId',this.currentUser.$id),Query.orderDesc('checkInDate'),Query.limit(100)])]);this.logbookEntries=e.documents;this.attendanceRecords=a.documents;this.calculateCurrentWeek()}catch(e){}}
      async loadSupervisorData(){if(!this.currentUser)return;try{const entries=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.logbookEntries,[Query.equal('supervisorId',this.currentUser.$id),Query.orderDesc('entryDate'),Query.limit(200)]);this.logbookEntries=entries.documents}catch(e){}}
      async loadPermissionRequests(){if(!this.currentUser||this.currentRole!=='supervisor')return;try{const reqs=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.permissionRequests,[Query.equal('supervisorId',this.currentUser.$id),Query.equal('status','pending'),Query.orderDesc('createdAt')]);this.permissionRequests=reqs.documents}catch(e){this.permissionRequests=[]}}
      calculateCurrentWeek(){if(this.attendanceRecords.length===0){this.currentWeek=1;return}const f=new Date(this.attendanceRecords[this.attendanceRecords.length-1].checkInDate);const t=new Date();this.currentWeek=Math.ceil(Math.abs(t-f)/(1000*60*60*24*7))||1}
      
      render(){this.updateTopBar();this.renderSideMenu();const mc=document.getElementById('mainContent');if(!this.currentUser){this.hideNavBar();mc.innerHTML=this.renderAuth();setTimeout(()=>this.setupRegionDropdown(),100)}else{this.showNavBar();if(this.showProfile)mc.innerHTML=this.renderProfile();else if(this.showEntryForm)mc.innerHTML=this.renderEntryForm();else if(this.showPermissionPage)mc.innerHTML=this.renderPermissionPage();else{switch(this.currentRole){case'student':mc.innerHTML=this.renderStudentDashboard();break;case'supervisor':mc.innerHTML=this.renderSupervisorDashboard();break;case'admin':mc.innerHTML=this.renderAdminDashboard();break}}}}
      
      goToDashboard(){this.activeSection='dashboard';this.showEntryForm=false;this.showProfile=false;this.showPermissionPage=false;this.selectedEntries.clear();this.render()}
      showProfilePage(){this.showProfile=true;this.showEntryForm=false;this.showPermissionPage=false;this.render()}
      toggleSideMenu(){const m=document.getElementById('sideMenu');const o=document.getElementById('menuOverlay');if(m.classList.contains('open')){m.classList.remove('open');o.classList.remove('active')}else{this.renderSideMenu();m.classList.add('open');o.classList.add('active')}}
      
      async checkIn(){const today=new Date().toISOString().split('T')[0];const now=new Date();const dl=new Date(now);dl.setHours(9,30,0,0);const isLate=now>dl;try{const ex=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,[Query.equal('studentId',this.currentUser.$id),Query.equal('checkInDate',today)]);if(ex.documents.length){if(ex.documents[0].permissionGranted){this.checkedInToday=true;this.showToast('Permission granted for today!','success');return}this.showToast('Already checked in!','warning');return}await databases.createDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,ID.unique(),{studentId:this.currentUser.$id,checkInDate:today,checkInTime:now.toISOString(),weekNumber:this.currentWeek,status:isLate?'late':'present',permissionGranted:false});this.checkedInToday=true;await this.loadStudentData();this.render();if(isLate){this.showToast('Late! Request permission to create entries.','warning')}else{this.showToast('Check-in successful!','success')}}catch(er){this.showToast(er.message,'error')}}
      async checkOut(){const today=new Date().toISOString().split('T')[0];try{const recs=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,[Query.equal('studentId',this.currentUser.$id),Query.equal('checkInDate',today)]);if(!recs.documents.length){this.showToast('Check in first!','warning');return}await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,recs.documents[0].$id,{checkOutTime:new Date().toISOString()});await this.loadStudentData();this.render();this.showToast('Check-out!','success')}catch(er){this.showToast(er.message,'error')}}
      
      showNewEntryForm(){if(!this.checkedInToday){this.showToast('Check in first!','warning');return}const today=new Date().toISOString().split('T')[0];databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,[Query.equal('studentId',this.currentUser.$id),Query.equal('checkInDate',today)]).then(async records=>{if(records.documents.length>0){const record=records.documents[0];if(record.status==='late'&&!record.permissionGranted){const permissions=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.permissionRequests,[Query.equal('studentId',this.currentUser.$id),Query.equal('requestDate',today),Query.equal('status','approved')]);if(permissions.documents.length>0){await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,record.$id,{permissionGranted:true});this.showEntryForm=true;this.showProfile=false;this.showPermissionPage=false;this.render();return}this.showPermissionPage=true;this.showEntryForm=false;this.showProfile=false;this.render();return}this.showEntryForm=true;this.showProfile=false;this.showPermissionPage=false;this.render()}}).catch(()=>{this.showToast('Error checking attendance.','error')})}
      renderPermissionPage(){return`<div style="max-width:500px;margin:40px auto;"><div class="glass-card"><div style="text-align:center;margin-bottom:16px;"><i class="fas fa-clock" style="font-size:3rem;color:var(--warning);"></i><h2 style="margin-top:10px;">Late Check-in</h2><p style="color:#64748b;margin-top:8px;">Request supervisor permission to create entries.</p></div><div id="permissionStatus" style="text-align:center;padding:12px;background:rgba(245,158,11,0.1);border-radius:8px;margin-bottom:12px;"><p><strong>Status:</strong> No request sent</p></div><button class="btn btn-lg btn-warning" onclick="app.requestPermission()" style="width:100%;margin-bottom:8px;"><i class="fas fa-paper-plane"></i> Request Permission</button><button class="btn btn-lg btn-outline" onclick="app.checkPermissionStatus()" style="width:100%;margin-bottom:8px;"><i class="fas fa-sync"></i> Check Status</button><button class="btn btn-lg btn-outline" onclick="app.goToDashboard()" style="width:100%;"><i class="fas fa-arrow-left"></i> Back</button></div></div>`}
      async requestPermission(){if(!this.currentUser.supervisorId||this.currentUser.supervisorId==='unassigned'){this.showToast('No supervisor! Go to Profile.','error');return}const today=new Date().toISOString().split('T')[0];try{const existing=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.permissionRequests,[Query.equal('studentId',this.currentUser.$id),Query.equal('requestDate',today)]);if(existing.documents.length>0){this.showToast('Already sent request today!','warning');return}await databases.createDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.permissionRequests,ID.unique(),{studentId:this.currentUser.$id,supervisorId:this.currentUser.supervisorId,requestDate:today,reason:'Late check-in',status:'pending',createdAt:new Date().toISOString()});await databases.createDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.notifications,ID.unique(),{recipientId:this.currentUser.supervisorId,title:'Permission Request',message:`${this.currentUser.fullName} requests permission after late check-in.`,type:'permission_request',isRead:false,createdAt:new Date().toISOString()});const sd=document.getElementById('permissionStatus');if(sd)sd.innerHTML='<p><strong>Status:</strong> <span class="badge badge-pending">Request Sent</span></p>';this.showToast('Permission request sent!','success')}catch(er){this.showToast(er.message,'error')}}
      async checkPermissionStatus(){const today=new Date().toISOString().split('T')[0];try{const permissions=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.permissionRequests,[Query.equal('studentId',this.currentUser.$id),Query.equal('requestDate',today)]);const sd=document.getElementById('permissionStatus');if(permissions.documents.length===0){if(sd)sd.innerHTML='<p>No request sent yet</p>';return}const req=permissions.documents[0];if(req.status==='approved'){const attendance=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,[Query.equal('studentId',this.currentUser.$id),Query.equal('checkInDate',today)]);if(attendance.documents.length>0){await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,attendance.documents[0].$id,{permissionGranted:true})}if(sd)sd.innerHTML='<div style="background:rgba(16,185,129,0.1);padding:12px;border-radius:8px;"><p><strong>Status:</strong> <span class="badge badge-approved">Approved!</span></p><button class="btn btn-success btn-sm" onclick="app.showNewEntryForm()" style="margin-top:8px;">Create Entry</button></div>';this.checkedInToday=true;this.showToast('Approved! You can create entries.','success')}else if(req.status==='rejected'){if(sd)sd.innerHTML='<div style="background:rgba(239,68,68,0.1);padding:12px;border-radius:8px;"><p><strong>Status:</strong> <span class="badge badge-rejected">Rejected</span></p></div>';this.showToast('Request rejected.','error')}else{if(sd)sd.innerHTML='<p><strong>Status:</strong> <span class="badge badge-pending">Pending</span></p>'}}catch(er){this.showToast(er.message,'error')}}
      async approvePermission(requestId){try{const req=await databases.getDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.permissionRequests,requestId);await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.permissionRequests,requestId,{status:'approved',approvedAt:new Date().toISOString()});const attendance=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,[Query.equal('studentId',req.studentId),Query.equal('checkInDate',req.requestDate)]);if(attendance.documents.length>0){await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.attendance,attendance.documents[0].$id,{permissionGranted:true})}await databases.createDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.notifications,ID.unique(),{recipientId:req.studentId,title:'Permission Approved',message:'Your supervisor approved your late check-in.',type:'permission_approved',isRead:false,createdAt:new Date().toISOString()});const notifs=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.notifications,[Query.equal('recipientId',req.studentId),Query.equal('type','permission_request'),Query.equal('isRead',false)]);for(const n of notifs.documents){await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.notifications,n.$id,{isRead:true})}this.showToast('Permission approved!','success');await this.loadSupervisorData();await this.loadPermissionRequests();await this.loadNotifications();this.render()}catch(er){this.showToast(er.message,'error')}}
      async rejectPermission(requestId){try{const req=await databases.getDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.permissionRequests,requestId);await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.permissionRequests,requestId,{status:'rejected'});await databases.createDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.notifications,ID.unique(),{recipientId:req.studentId,title:'Permission Rejected',message:'Your supervisor rejected your request.',type:'permission_rejected',isRead:false,createdAt:new Date().toISOString()});this.showToast('Permission rejected!','success');await this.loadSupervisorData();await this.loadPermissionRequests();this.render()}catch(er){this.showToast(er.message,'error')}}
      
      // ==================== HISTORY ====================
      showHistory(){
        const modal=document.getElementById('attendanceModal');
        if(this.currentRole==='student'){
          const allEntries=this.logbookEntries;
          const approved=allEntries.filter(e=>e.status==='Approved');
          const rejected=allEntries.filter(e=>e.status==='Rejected');
          const pending=allEntries.filter(e=>e.status==='Pending Review');
          const drafts=allEntries.filter(e=>e.status==='Draft'||!e.status);
          modal.innerHTML=`<div class="modal-content" style="max-width:800px;"><div class="modal-header"><h3><i class="fas fa-history"></i> My Entry History</h3><button class="close-btn" onclick="app.closeAttendanceModal()">✕</button></div><div style="max-height:60vh;overflow-y:auto;padding-right:6px;">
            <div class="history-section"><h4 style="background:rgba(16,185,129,0.1);color:var(--success);"><i class="fas fa-check-circle"></i> Approved (${approved.length})</h4>${approved.length>0?approved.map(e=>`<div class="history-item" style="border:1px solid #d1fae5;background:rgba(16,185,129,0.02);"><p><strong>${e.activityTitle}</strong></p><p>Date: ${new Date(e.entryDate).toLocaleDateString()} | Week: ${e.weekNumber}</p><p>Submitted: ${e.submissionDay}, ${e.submissionDate} at ${e.submissionTime}</p>${e.supervisorSignature?`<p>Signature: <img src="${e.supervisorSignature}" style="max-height:40px;border-radius:6px;"></p>`:''}${e.supervisorComment?`<p>Comment: ${e.supervisorComment}</p>`:''}</div>`).join(''):'<p style="color:#94a3b8;padding:8px;">No approved entries</p>'}</div>
            <div class="history-section"><h4 style="background:rgba(239,68,68,0.1);color:var(--error);"><i class="fas fa-times-circle"></i> Rejected (${rejected.length})</h4>${rejected.length>0?rejected.map(e=>`<div class="history-item" style="border:1px solid #fee2e2;background:rgba(239,68,68,0.02);"><p><strong>${e.activityTitle}</strong></p><p>Date: ${new Date(e.entryDate).toLocaleDateString()} | Week: ${e.weekNumber}</p><p>Reason: ${e.supervisorComment||'No reason'}</p></div>`).join(''):'<p style="color:#94a3b8;padding:8px;">No rejected entries</p>'}</div>
            <div class="history-section"><h4 style="background:rgba(245,158,11,0.1);color:var(--warning);"><i class="fas fa-clock"></i> Pending (${pending.length})</h4>${pending.length>0?pending.map(e=>`<div class="history-item" style="border:1px solid #fef3c7;background:rgba(245,158,11,0.02);"><p><strong>${e.activityTitle}</strong></p><p>Date: ${new Date(e.entryDate).toLocaleDateString()} | Week: ${e.weekNumber}</p><p>Submitted: ${e.submissionDay}, ${e.submissionDate} at ${e.submissionTime}</p></div>`).join(''):'<p style="color:#94a3b8;padding:8px;">No pending entries</p>'}</div>
            <div class="history-section"><h4 style="background:rgba(226,232,240,0.5);color:#64748b;"><i class="fas fa-pencil-alt"></i> Drafts (${drafts.length})</h4>${drafts.length>0?drafts.map(e=>`<div class="history-item" style="border:1px solid #e2e8f0;"><p><strong>${e.activityTitle}</strong></p><p>Date: ${new Date(e.entryDate).toLocaleDateString()} | Week: ${e.weekNumber}</p></div>`).join(''):'<p style="color:#94a3b8;padding:8px;">No drafts</p>'}</div>
          </div><div style="text-align:center;margin-top:16px;padding-top:12px;border-top:1px solid var(--outline);"><p style="font-size:0.8rem;color:#94a3b8;">Total: ${allEntries.length} entries</p><button class="btn btn-outline btn-sm" onclick="app.exportEntries('all')"><i class="fas fa-download"></i> Export All</button></div></div>`;
        }else if(this.currentRole==='supervisor'){
          const approved=this.logbookEntries.filter(e=>e.status==='Approved');
          const rejected=this.logbookEntries.filter(e=>e.status==='Rejected');
          modal.innerHTML=`<div class="modal-content" style="max-width:800px;"><div class="modal-header"><h3><i class="fas fa-history"></i> Review History</h3><button class="close-btn" onclick="app.closeAttendanceModal()">✕</button></div><div style="max-height:60vh;overflow-y:auto;padding-right:6px;">
            <div class="history-section"><h4 style="background:rgba(16,185,129,0.1);color:var(--success);"><i class="fas fa-check-circle"></i> Approved (${approved.length})</h4>${approved.length>0?approved.map(e=>{const s=this.allUsers.find(u=>u.$id===e.studentId);return`<div class="history-item" style="border:1px solid #d1fae5;background:rgba(16,185,129,0.02);"><p><strong>Student:</strong> ${s?.fullName||'Unknown'} (${s?.regNo||'N/A'})</p><p><strong>${e.activityTitle}</strong></p><p>Date: ${new Date(e.entryDate).toLocaleDateString()} | Week: ${e.weekNumber}</p><p>Submitted: ${e.submissionDay}, ${e.submissionDate} at ${e.submissionTime}</p><p>Reviewed: ${e.reviewedDate} at ${e.reviewedTime}</p>${e.supervisorSignature?`<p>Signature: <img src="${e.supervisorSignature}" style="max-height:40px;border-radius:6px;"></p>`:''}${e.supervisorComment?`<p>Comment: ${e.supervisorComment}</p>`:''}</div>`}).join(''):'<p style="color:#94a3b8;padding:8px;">No approved entries</p>'}</div>
            <div class="history-section"><h4 style="background:rgba(239,68,68,0.1);color:var(--error);"><i class="fas fa-times-circle"></i> Rejected (${rejected.length})</h4>${rejected.length>0?rejected.map(e=>{const s=this.allUsers.find(u=>u.$id===e.studentId);return`<div class="history-item" style="border:1px solid #fee2e2;background:rgba(239,68,68,0.02);"><p><strong>Student:</strong> ${s?.fullName||'Unknown'} (${s?.regNo||'N/A'})</p><p><strong>${e.activityTitle}</strong></p><p>Date: ${new Date(e.entryDate).toLocaleDateString()} | Week: ${e.weekNumber}</p><p>Reason: ${e.supervisorComment||'No reason'}</p></div>`}).join(''):'<p style="color:#94a3b8;padding:8px;">No rejected entries</p>'}</div>

his.signatureCanvas.ontouchmove=(e)=>{e.preventDefault();if(!this.isDrawing)return;const touch=e.touches[0];const rect=this.signatureCanvas.getBoundingClientRect();this.signatureCtx.lineTo(touch.clientX-rect.left,touch.clientY-rect.top);this.signatureCtx.stroke()};this.signatureCanvas.ontouchend=()=>{this.isDrawing=false}}},100)}

      exportEntries(type){let entries=[...this.logbookEntries];const now=new Date();if(type==='weekly'){const ws=new Date(now);ws.setDate(now.getDate()-now.getDay());entries=entries.filter(e=>new Date(e.entryDate)>=ws)}else if(type==='monthly'){const ms=new Date(now.getFullYear(),now.getMonth(),1);entries=entries.filter(e=>new Date(e.entryDate)>=ms)}if(entries.length===0){this.showToast('No entries!','warning');return}const user=this.currentUser;let content=`HAS FIELD SYSTEM - TRAINING LOGBOOK\n${'='.repeat(50)}\n\nStudent: ${user.fullName||'N/A'}\nReg No: ${user.regNo||'N/A'}\nInstitution: ${user.institution||'N/A'}\nExport Date: ${now.toLocaleDateString()}\n${'='.repeat(50)}\n\n`;entries.forEach((e,i)=>{content+=`Entry ${i+1}\n${'-'.repeat(30)}\nDate: ${new Date(e.entryDate).toLocaleDateString()}\nDay: ${e.submissionDay||''}\nTime: ${e.submissionTime||''}\nWeek: ${e.weekNumber}\nStatus: ${e.status||'Draft'}\nActivity: ${e.activityTitle||''}\n`;if(e.objectives)content+=`\nObjectives:\n${e.objectives}\n`;content+=`\nActivities Performed:\n${e.activitiesPerformed||''}\n\nDescription:\n${e.description||''}\n`;if(e.skillsAcquired)content+=`\nSkills Acquired:\n${e.skillsAcquired}\n`;if(e.challengesFaced)content+=`\nChallenges Faced:\n${e.challengesFaced}\n`;if(e.solutionsApplied)content+=`\nSolutions Applied:\n${e.solutionsApplied}\n`;if(e.lessonsLearned)content+=`\nLessons Learned:\n${e.lessonsLearned}\n`;if(e.recommendations)content+=`\nRecommendations:\n${e.recommendations}\n`;if(e.supervisorSignature)content+=`\nSupervisor: Approved with digital signature\nDate: ${e.reviewedDate||''}\n`;if(e.supervisorComment)content+=`Comment: ${e.supervisorComment}\n`;content+=`\n`});content+=`${'='.repeat(50)}\nEnd of Report\nGenerated by HAS Field System`;const blob=new Blob([content],{type:'application/msword'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`HAS_Field_Logbook_${type}_${now.toISOString().split('T')[0]}.doc`;document.body.appendChild(a);a.click();document.body.removeChild(a);this.closeExportModal();this.showToast(`${entries.length} entries exported!`,'success')}

      renderStudentDashboard(){if(!this.currentUser)return'';const approved=this.logbookEntries.filter(e=>e.status==='Approved').length;const pending=this.logbookEntries.filter(e=>e.status==='Pending Review').length;const rejected=this.logbookEntries.filter(e=>e.status==='Rejected');const mySupervisor=this.supervisors.find(s=>s.$id===this.selectedSupervisor);return`${mySupervisor?`<div class="glass-card" style="background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);"><p><i class="fas fa-check-circle" style="color:var(--success);"></i> <strong>Supervisor:</strong> ${mySupervisor.fullName}</p></div>`:`<div class="glass-card" style="background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.2);"><p><i class="fas fa-exclamation-triangle" style="color:var(--warning);"></i> No supervisor! Go to Profile.</p></div>`}${!this.checkedInToday?`<div class="glass-card" style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);"><p><i class="fas fa-exclamation-circle" style="color:var(--error);"></i> Not checked in!</p></div>`:''}<div class="grid"><div class="glass-card stat-card"><div class="stat-value">${this.attendanceRecords.length}</div><div class="stat-label">Attendance Days</div></div><div class="glass-card stat-card" style="background:linear-gradient(135deg,#10b981,#059669);"><div class="stat-value">${approved}</div><div class="stat-label">Approved</div></div><div class="glass-card stat-card" style="background:linear-gradient(135deg,#f59e0b,#d97706);"><div class="stat-value">${pending}</div><div class="stat-label">Pending</div></div></div>${rejected.length>0?`<div class="glass-card"><h3 style="color:var(--error);"><i class="fas fa-exclamation-circle"></i> Rejected Entries</h3>${rejected.map(e=>`<div class="entry-item" style="border-color:#fecaca;background:rgba(239,68,68,0.03);"><div style="flex:1;"><strong>${e.activityTitle}</strong><p style="font-size:0.75rem;color:var(--error);">${e.supervisorComment||'No reason'}</p></div><button class="btn btn-sm btn-danger" onclick="app.deleteAndResubmit('${e.$id}')"><i class="fas fa-redo"></i> Delete & Resubmit</button></div>`).join('')}</div>`:''}<div class="glass-card"><h3>Recent Entries</h3><div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;"><thead><tr><th style="padding:8px;">Date</th><th style="padding:8px;">Activity</th><th style="padding:8px;">Status</th><th style="padding:8px;">Signature</th></tr></thead><tbody>${this.logbookEntries.slice(0,10).map(e=>`<tr><td style="padding:8px;">${new Date(e.entryDate).toLocaleDateString()}<br><small>${e.submissionDay||''}</small></td><td style="padding:8px;">${e.activityTitle}</td><td style="padding:8px;"><span class="badge badge-${e.status?.toLowerCase().replace(' ','-')||'draft'}">${e.status||'Draft'}</span></td><td style="padding:8px;">${e.supervisorSignature?`<img src="${e.supervisorSignature}" class="signature-img" alt="Signature">`:'-'}</td></tr>`).join('')}</tbody></table></div></div>`}
      renderSupervisorDashboard(){const pending=this.logbookEntries.filter(e=>e.status==='Pending Review');const students=[...new Set(this.logbookEntries.map(e=>e.studentId))];return`<div class="grid"><div class="glass-card stat-card"><div class="stat-value">${students.length}</div><div class="stat-label">My Students</div></div><div class="glass-card stat-card" style="background:linear-gradient(135deg,#f59e0b,#d97706);"><div class="stat-value">${pending.length}</div><div class="stat-label">Pending Reviews</div></div><div class="glass-card stat-card" style="background:linear-gradient(135deg,#10b981,#059669);"><div class="stat-value">${this.logbookEntries.filter(e=>e.status==='Approved').length}</div><div class="stat-label">Approved</div></div></div>${this.permissionRequests.length>0?`<div class="glass-card"><h3><i class="fas fa-clock"></i> Permission Requests</h3>${this.permissionRequests.map(req=>{const student=this.allUsers.find(u=>u.$id===req.studentId);return`<div class="entry-item"><div style="flex:1;"><strong>${student?.fullName||req.studentId}</strong><p style="font-size:0.75rem;">Late check-in - ${new Date(req.requestDate).toLocaleDateString()}</p></div><div style="display:flex;gap:5px;"><button class="btn btn-success btn-sm" onclick="app.approvePermission('${req.$id}')">Approve</button><button class="btn btn-danger btn-sm" onclick="app.rejectPermission('${req.$id}')">Reject</button></div></div>`}).join('')}</div>`:''}<div class="glass-card"><h3>My Students</h3>${students.map(sid=>{const s=this.allUsers.find(u=>u.$id===sid);return s?`<div class="user-item"><div style="flex:1;"><strong>${s.fullName}</strong><p style="font-size:0.75rem;">${s.regNo||'N/A'}</p></div><button class="btn btn-sm btn-outline" onclick="app.viewStudentAttendance('${s.$id}')">Attendance</button></div>`:''}).join('')||'<p>No students yet</p>'}</div>${pending.length>0?`<div class="glass-card"><div class="flex-between"><h3>Pending Reviews</h3><button class="btn btn-danger btn-sm" onclick="app.bulkDeleteEntries()" ${this.selectedEntries.size===0?'disabled':''}>Delete (${this.selectedEntries.size})</button></div>${pending.map(e=>`<div class="entry-item"><div class="checkbox-cell"><input type="checkbox" ${this.selectedEntries.has(e.$id)?'checked':''} onchange="app.toggleEntrySelection('${e.$id}')"></div><div style="flex:1;cursor:pointer;" onclick="app.previewEntry('${e.$id}')"><strong>${e.activityTitle}</strong><p style="font-size:0.75rem;">${e.submissionDay}, ${e.submissionDate} at ${e.submissionTime} • Week ${e.weekNumber}</p></div><div style="display:flex;gap:5px;"><button class="btn btn-success btn-sm" onclick="event.stopPropagation();app.openSignaturePad('${e.$id}')">Sign</button><button class="btn btn-danger btn-sm" onclick="event.stopPropagation();app.rejectEntry('${e.$id}')">Reject</button></div></div>`).join('')}</div>`:'<div class="glass-card"><div class="empty-state"><i class="fas fa-check-circle"></i><p>No pending reviews</p></div></div>'}`}
      renderAdminDashboard(){return`<div class="grid"><div class="glass-card stat-card"><div class="stat-value">${this.allUsers.filter(u=>u.role==='student').length}</div><div class="stat-label">Students</div></div><div class="glass-card stat-card" style="background:linear-gradient(135deg,#10b981,#059669);"><div class="stat-value">${this.supervisors.length}</div><div class="stat-label">Supervisors</div></div><div class="glass-card stat-card" style="background:linear-gradient(135deg,#f59e0b,#d97706);"><div class="stat-value">${this.allUsers.length}</div><div class="stat-label">Total Users</div></div></div><div class="glass-card"><h3>All Users</h3><div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;"><thead><tr><th style="padding:8px;">Name</th><th style="padding:8px;">Role</th><th style="padding:8px;">Status</th><th style="padding:8px;">Actions</th></tr></thead><tbody>${this.allUsers.slice(0,30).map(u=>`<tr><td style="padding:8px;">${u.fullName}<br><small>${u.email}</small></td><td style="padding:8px;"><span class="badge badge-${u.role==='student'?'info':'approved'}">${u.role}</span></td><td style="padding:8px;"><span class="badge badge-${u.accountStatus==='active'?'approved':'rejected'}">${u.accountStatus||'active'}</span></td><td style="padding:8px;"><button class="btn btn-sm btn-outline" onclick="app.toggleUserStatus('${u.$id}','${u.accountStatus}')">${u.accountStatus==='active'?'Disable':'Activate'}</button><button class="btn btn-sm btn-danger" onclick="app.deleteUser('${u.$id}')">Delete</button></td></tr>`).join('')}</tbody></table></div></div><div class="glass-card"><h3>Recovery Requests</h3><div id="recoveryRequestsList">Loading...</div></div>`}
      renderProfile(){const user=this.currentUser;if(!user)return'';const mySupervisor=this.supervisors.find(s=>s.$id===this.selectedSupervisor);return`<div class="glass-card"><h2><i class="fas fa-user-circle"></i> My Profile</h2><div class="grid" style="margin-top:10px;"><div><p><strong>Name:</strong> ${user.fullName}</p><p><strong>Reg No:</strong> ${user.regNo}</p></div><div><p><strong>Institution:</strong> ${user.institution}</p><p><strong>Programme:</strong> ${user.programme}</p></div></div><div style="margin-top:14px;padding:12px;background:rgba(37,99,235,0.04);border-radius:10px;"><h4><i class="fas fa-user-tie"></i> Supervisor</h4>${mySupervisor?`<p><strong>${mySupervisor.fullName}</strong> - ${mySupervisor.email}</p>`:'<p style="color:var(--warning);">No supervisor assigned.</p>'}</div></div><div class="glass-card"><h3>Select Supervisor</h3><div class="input-group" style="margin-top:10px;"><input type="text" id="supervisorSearch" placeholder="Search supervisor..." oninput="app.searchSupervisor()" value="${this.searchSupervisorQuery}"></div><div style="max-height:200px;overflow-y:auto;">${this.getFilteredSupervisors().map(sup=>`<div class="supervisor-card ${this.selectedSupervisor===sup.$id?'selected':''}" onclick="app.selectSupervisor('${sup.$id}')"><div class="flex-between"><div><strong>${sup.fullName}</strong><p style="font-size:0.75rem;">${sup.email}</p></div>${this.selectedSupervisor===sup.$id?'<span class="badge badge-approved">Selected</span>':'<button class="btn btn-sm">Select</button>'}</div></div>`).join('')}</div></div>`}
      renderEntryForm(){return`<div class="glass-card"><div class="flex-between" style="margin-bottom:14px;"><h2><i class="fas fa-plus-circle"></i> New Entry</h2><button class="btn btn-outline btn-sm" onclick="app.goToDashboard()"><i class="fas fa-arrow-left"></i> Back</button></div><form onsubmit="app.saveEntry(event)"><div class="input-group"><label>Activity Title *</label><input type="text" id="activityTitle" required></div><div class="grid grid-2"><div class="input-group"><label>Date *</label><input type="date" id="entryDate" required value="${new Date().toISOString().split('T')[0]}"></div><div class="input-group"><label>Week</label><input type="number" id="weekNumber" value="${this.currentWeek}" readonly></div></div><div class="input-group"><label>Objectives</label><textarea id="objectives" rows="2"></textarea></div><div class="input-group"><label>Activities Performed *</label><textarea id="activitiesPerformed" rows="3" required></textarea></div><div class="input-group"><label>Description *</label><textarea id="description" rows="3" required></textarea></div><div class="grid grid-2"><div class="input-group"><label>Skills Acquired</label><textarea id="skillsAcquired" rows="2"></textarea></div><div class="input-group"><label>Challenges Faced</label><textarea id="challengesFaced" rows="2"></textarea></div></div><div class="grid grid-2"><div class="input-group"><label>Solutions Applied</label><textarea id="solutionsApplied" rows="2"></textarea></div><div class="input-group"><label>Lessons Learned</label><textarea id="lessonsLearned" rows="2"></textarea></div></div><div class="input-group"><label>Recommendations</label><textarea id="recommendations" rows="2"></textarea></div><div style="display:flex;gap:8px;margin-top:14px;"><button type="submit" class="btn" name="action" value="submit"><i class="fas fa-paper-plane"></i> Submit for Review</button><button type="submit" class="btn btn-outline" name="action" value="draft"><i class="fas fa-save"></i> Save Draft</button></div></form></div>`}
      
      renderAuth(){return`<div class="auth-wrapper"><div class="auth-container"><div class="auth-card"><div class="auth-logo"><img src="${LOGO_URL}" alt="HAS Logo" onerror="this.style.display='none'"><h1>HAS Field System</h1><p>Student Training Logbook Management</p></div>${this.currentView==='login'?this.renderLoginForm():this.currentView==='register'?this.renderRegisterForm():this.renderForgotPasswordForm()}</div></div></div>`}
      renderLoginForm(){return`<form onsubmit="app.handleLogin(event)"><div class="input-group"><label>Email Address</label><input type="email" id="loginEmail" placeholder="Enter your email" required></div><div class="input-group"><label>Password</label><input type="password" id="loginPassword" placeholder="Enter your password" required></div><button type="submit" class="btn-auth"><i class="fas fa-sign-in-alt"></i> Sign In</button></form><div class="auth-links"><p>Don't have an account? <a onclick="app.switchView('register')">Create Account</a></p><p><a onclick="app.switchView('forgot')">Forgot Password?</a></p></div>`}
      renderRegisterForm(){return`<form onsubmit="app.handleRegister(event)"><div class="input-group"><label>Full Name *</label><input type="text" id="regFullName" placeholder="Enter full name" required></div><div class="grid grid-2"><div class="input-group"><label>Reg Number *</label><input type="text" id="regRegNo" placeholder="e.g. HAS/2024/001" required></div><div class="input-group"><label>Phone *</label><input type="text" id="regPhone" placeholder="07XXXXXXXX" required></div></div><div class="input-group"><label>Email Address *</label><input type="email" id="regEmail" placeholder="Enter email" required></div><div class="grid grid-2"><div class="input-group"><label>Institution *</label><input type="text" id="regInstitution" placeholder="Institution name" required></div><div class="input-group"><label>Programme *</label><input type="text" id="regProgramme" placeholder="Programme name" required></div></div><div class="grid grid-2"><div class="input-group"><label>Region *</label><select id="regRegion" onchange="app.updateDistricts()" required><option value="">Select Region</option></select></div><div class="input-group"><label>District *</label><select id="regDistrict" required><option value="">Select District</option></select></div></div><div class="input-group"><label>Gender *</label><select id="regGender" required><option value="">Select</option><option>Male</option><option>Female</option></select></div><div class="grid grid-2"><div class="input-group"><label>Password *</label><input type="password" id="regPassword" placeholder="Min. 8 characters" required></div><div class="input-group"><label>Confirm Password *</label><input type="password" id="regConfirmPassword" placeholder="Confirm password" required></div></div><button type="submit" class="btn-auth"><i class="fas fa-user-plus"></i> Create Account</button></form><div class="auth-links"><p>Already have an account? <a onclick="app.switchView('login')">Sign In</a></p></div>`}
      renderForgotPasswordForm(){return`<form onsubmit="app.handleForgotPassword(event)"><div style="margin-bottom:14px;padding:12px;background:rgba(37,99,235,0.04);border-radius:8px;border:1px solid rgba(37,99,235,0.1);"><p style="font-size:0.82rem;color:#475569;margin:0;"><i class="fas fa-info-circle" style="color:var(--primary);"></i> Enter registration number and email. Admin provides temporary password.</p></div><div class="input-group"><label>Registration Number *</label><input type="text" id="forgotRegNo" placeholder="Enter reg number" required></div><div class="input-group"><label>Email Address *</label><input type="email" id="forgotEmail" placeholder="Enter email" required></div><button type="submit" class="btn-auth"><i class="fas fa-paper-plane"></i> Request Recovery</button></form><div id="recoverySection" class="hidden" style="margin-top:18px;padding-top:16px;border-top:1px solid var(--outline);"><h4 style="font-size:0.9rem;margin-bottom:12px;color:var(--primary);">Reset Password</h4><div class="input-group"><label>Temporary Password</label><input type="text" id="tempPassword" placeholder="From admin"></div><div class="input-group"><label>New Password</label><input type="password" id="newPassword" placeholder="New password"></div><div class="input-group"><label>Confirm New Password</label><input type="password" id="confirmNewPassword" placeholder="Confirm password"></div><button type="button" class="btn-auth" style="background:linear-gradient(135deg,var(--success),#059669);" onclick="app.resetPassword()"><i class="fas fa-check"></i> Reset Password</button></div><div class="auth-links"><p><a onclick="app.switchView('login')">← Back to Sign In</a></p></div>`}
      
      async handleLogin(e){e.preventDefault();try{await account.createEmailSession(document.getElementById('loginEmail').value,document.getElementById('loginPassword').value);await this.checkSession();this.showToast('Welcome!','success')}catch(er){this.showToast(er.message,'error')}}
      async handleRegister(e){e.preventDefault();if(document.getElementById('regPassword').value!==document.getElementById('regConfirmPassword').value){this.showToast('Passwords mismatch!','error');return}try{await account.create(ID.unique(),document.getElementById('regEmail').value,document.getElementById('regPassword').value,document.getElementById('regFullName').value);await account.createEmailSession(document.getElementById('regEmail').value,document.getElementById('regPassword').value);const user=await account.get();await databases.createDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.users,user.$id,{fullName:document.getElementById('regFullName').value,regNo:document.getElementById('regRegNo').value,email:document.getElementById('regEmail').value,phone:document.getElementById('regPhone').value,institution:document.getElementById('regInstitution').value,programme:document.getElementById('regProgramme').value,region:document.getElementById('regRegion').value,district:document.getElementById('regDistrict').value,gender:document.getElementById('regGender').value,role:'student',supervisorId:null,accountStatus:'active'});await this.checkSession();this.showToast('Registered!','success')}catch(er){this.showToast(er.message,'error')}}
      async handleForgotPassword(e){e.preventDefault();try{await databases.createDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.recoveryRequests,ID.unique(),{studentId:'pending',regNo:document.getElementById('forgotRegNo').value,email:document.getElementById('forgotEmail').value,temporaryPassword:'',status:'pending',expiresAt:new Date(Date.now()+86400000).toISOString(),createdAt:new Date().toISOString()});document.getElementById('recoverySection').classList.remove('hidden');this.showToast('Request submitted!','success')}catch(er){this.showToast(er.message,'error')}}
      async resetPassword(){if(document.getElementById('newPassword').value!==document.getElementById('confirmNewPassword').value){this.showToast('Passwords mismatch!','error');return}try{const reqs=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.recoveryRequests,[Query.equal('regNo',document.getElementById('forgotRegNo').value),Query.equal('status','generated')]);if(!reqs.documents.length){this.showToast('No valid request','error');return}const r=reqs.documents[0];if(r.temporaryPassword!==document.getElementById('tempPassword').value){this.showToast('Invalid temp password','error');return}await account.updatePassword(document.getElementById('newPassword').value,document.getElementById('tempPassword').value);await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.recoveryRequests,r.$id,{status:'used',usedAt:new Date().toISOString()});this.showToast('Password reset!','success');this.switchView('login')}catch(er){this.showToast(er.message,'error')}}
      async selectSupervisor(sid){try{await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.users,this.currentUser.$id,{supervisorId:sid});this.selectedSupervisor=sid;this.currentUser.supervisorId=sid;this.showToast('Supervisor selected!','success');this.render()}catch(er){this.showToast(er.message,'error')}}
      async toggleUserStatus(uid,cs){const ns=cs==='active'?'disabled':'active';try{await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.users,uid,{accountStatus:ns});this.showToast(`User ${ns==='active'?'activated':'disabled'}!`,'success');await this.loadInitialData();this.render()}catch(e){this.showToast(e.message,'error')}}
      async logout(){try{await account.deleteSession('current')}catch(e){}this.resetState();this.hideNavBar();document.getElementById('mainContent').innerHTML='';localStorage.removeItem('cookieFallback');this.currentView='login';this.render();this.showToast('Logged out','success')}
      
      switchView(v){this.currentView=v;this.render();setTimeout(()=>this.setupRegionDropdown(),100)}
      setupRegionDropdown(){const s=document.getElementById('regRegion');if(s){s.innerHTML='<option value="">Select Region</option>';Object.keys(tanzaniaData).sort().forEach(r=>s.innerHTML+=`<option value="${r}">${r}</option>`)}}
      updateDistricts(){const r=document.getElementById('regRegion')?.value;const d=document.getElementById('regDistrict');if(d){d.innerHTML='<option value="">Select District</option>';if(r&&tanzaniaData[r])tanzaniaData[r].forEach(dd=>d.innerHTML+=`<option value="${dd}">${dd}</option>`)}}
      toggleDarkMode(){this.darkMode=!this.darkMode;document.body.classList.toggle('dark');localStorage.setItem('darkMode',this.darkMode);this.renderSideMenu()}
      getFilteredSupervisors(){if(!this.searchSupervisorQuery)return this.supervisors;const q=this.searchSupervisorQuery.toLowerCase();return this.supervisors.filter(s=>s.fullName?.toLowerCase().includes(q)||s.email?.toLowerCase().includes(q))}
      searchSupervisor(){this.searchSupervisorQuery=document.getElementById('supervisorSearch')?.value||'';this.render()}
      
      openNotificationDrawer(){const d=document.getElementById('drawer');const o=document.getElementById('overlay');d.innerHTML=`<div class="drawer-header"><h3><i class="fas fa-bell"></i> Notifications</h3><button class="drawer-close" onclick="closeDrawer()">✕</button></div><div>${this.notifications.length>0?this.notifications.map(n=>`<div style="padding:10px;border-left:3px solid var(--primary);margin-bottom:6px;border-radius:6px;${n.isRead?'opacity:0.6':''}"><strong>${n.title}</strong><p style="font-size:0.8rem;">${n.message}</p><small style="color:#94a3b8;">${new Date(n.createdAt).toLocaleString()}</small></div>`).join(''):'<div class="empty-state"><i class="fas fa-bell-slash"></i><p>No notifications</p></div>'}</div>`;d.classList.add('open');o.classList.add('active')}
      
      openChecklistModal(){this.toggleSideMenu();const modal=document.getElementById('checklistModal');let html=`<div class="modal-content"><div class="modal-header"><h3><i class="fas fa-clipboard-list"></i> PT Field Checklist</h3><button class="close-btn" onclick="app.closeChecklistModal()">✕</button></div><div style="max-height:55vh;overflow-y:auto;">`;for(const[cat,data]of Object.entries(fieldChecklist)){html+=`<div class="checklist-cat"><h4><i class="fas ${data.icon}"></i> ${cat}</h4>`;data.items.forEach(i=>{html+=`<div class="checklist-item"><i class="fas fa-circle"></i><span>${i}</span></div>`});html+=`</div>`}html+=`</div></div>`;modal.innerHTML=html;modal.classList.remove('hidden');modal.onclick=function(e){if(e.target===modal)app.closeChecklistModal()}}
      closeChecklistModal(){const m=document.getElementById('checklistModal');m.classList.add('hidden');m.innerHTML=''}
      
      showToast(msg,type='info'){const t=document.createElement('div');t.style.cssText=`position:fixed;bottom:20px;right:20px;padding:12px 20px;background:${type==='error'?'#ef4444':type==='success'?'#10b981':type==='warning'?'#f59e0b':'#2563eb'};color:white;border-radius:24px;z-index:10000;font-size:0.85rem;box-shadow:0 8px 25px rgba(0,0,0,0.2);`;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300)},3000)}
      
      showRecoveryRequests(){this.loadRecoveryRequests()}
      async loadRecoveryRequests(){try{const reqs=await databases.listDocuments(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.recoveryRequests,[Query.orderDesc('createdAt')]);const el=document.getElementById('recoveryRequestsList');if(el)el.innerHTML=reqs.documents.map(r=>`<div style="padding:10px;margin-bottom:6px;border:1px solid var(--outline);border-radius:8px;"><p><strong>Reg:</strong> ${r.regNo} | <strong>Status:</strong> <span class="badge badge-${r.status==='pending'?'pending':'approved'}">${r.status}</span></p>${r.status==='pending'?`<button class="btn btn-success btn-sm" onclick="app.generateTempPassword('${r.$id}')"><i class="fas fa-key"></i> Generate</button>`:r.temporaryPassword?`<p><strong>Temp:</strong> <code>${r.temporaryPassword}</code></p>`:''}<button class="btn btn-sm btn-danger" onclick="app.deleteRecoveryRequest('${r.$id}')"><i class="fas fa-trash"></i></button></div>`).join('')||'<p>No requests</p>'}catch(e){}}
      async generateTempPassword(id){const p=Math.random().toString(36).slice(-8);await databases.updateDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.recoveryRequests,id,{temporaryPassword:p,status:'generated'});this.showToast(`Password: ${p}`,'success');this.loadRecoveryRequests()}
      async deleteRecoveryRequest(id){if(!confirm('Delete?'))return;try{await databases.deleteDocument(APPWRITE_CONFIG.databaseId,APPWRITE_CONFIG.collections.recoveryRequests,id);this.showToast('Deleted!','success');this.loadRecoveryRequests()}catch(e){this.showToast(e.message,'error')}}
    }
    
    function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('overlay').classList.remove('active')}
    const app=new AppState();window.app=app;window.closeDrawer=closeDrawer;app.initialize();
  </script>
</body>
</html>
